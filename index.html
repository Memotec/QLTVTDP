<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - TRẦN VĂN TRƯỜNG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        
        .no-print { max-width: 1250px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 4px; outline: none; }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 14px; }
        .btn-add { background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-excel { background: #10b981; }
        .btn-label { background: #f59e0b; }
        .btn-print { background: #0f172a; }
        .btn-form { background: #8b5cf6; padding: 6px 10px !important; font-size: 12px; }
        .btn-del { background: var(--danger); padding: 6px 10px !important; font-size: 12px; }
        .btn-logout { background: #64748b; margin-top: 10px; width: 100%; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 8px; overflow: hidden; }
        thead { background: #f8fafc; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        
        .admin-only { display: none; }
        .qr-container { background: #fff; display: inline-block; padding: 2px; }

        /* --- THIẾT KẾ NHÃN (LABEL) CHUYÊN NGHIỆP --- */
        #labelArea { display: none; }
        @media print {
            .no-print, #loginOverlay { display: none !important; }
            body { background: white; padding: 0; }
            
            body.printing-labels #labelArea { 
                display: grid !important; 
                grid-template-columns: repeat(3, 1fr); 
                gap: 5mm; 
                padding: 10mm;
            }
            .label-item {
                border: 1px solid #000;
                padding: 3mm;
                display: flex;
                align-items: center;
                justify-content: space-between;
                page-break-inside: avoid;
                height: 35mm;
                width: 60mm;
            }
            .label-info {
                flex: 1;
                font-size: 7.5pt;
                line-height: 1.4;
                font-weight: bold;
                text-transform: uppercase;
                padding-right: 2mm;
            }
            .label-qr {
                width: 22mm;
                height: 22mm;
            }
            
            /* Báo cáo SOP & Phiếu báo */
            body.printing-usage #formUsageArea, body.printing-report #printArea { display: block !important; }
            #printArea, #formUsageArea { display: none; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3 style="margin-bottom: 20px; color: var(--p);">ĐĂNG NHẬP HỆ THỐNG</h3>
        <input type="text" id="user" placeholder="Tên đăng nhập">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button class="btn-add" style="width: 100%; margin-top: 15px;" onclick="checkLogin()">Vào hệ thống</button>
    </div>
</div>

<div class="no-print" id="mainApp">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: var(--p);">QUẢN LÝ THIẾT BỊ CNS/ATM</h2>
        <p style="font-size: 12px;">Cán bộ phụ trách: <b id="displayUser"></b></p>
    </div>

    <div class="card admin-only" id="inputCard">
        <div class="form-grid">
            <div class="full"><label>Tên thiết bị / Model</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí lắp đặt</label><input type="text" id="inLoc"></div>
        </div>
        <div class="actions">
            <button class="btn-add" style="grid-column: span 5;" onclick="addItem()">➕ Thêm thiết bị mới</button>
        </div>
    </div>

    <div class="card">
        <div class="actions">
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Xuất Excel</button>
            <button class="btn-label" onclick="printLabels()">🏷️ In Nhãn (Labels)</button>
            <button class="btn-print" onclick="printReport()">📄 Báo cáo SOP</button>
            <button class="btn-logout" onclick="location.reload()">🔒 Đăng xuất</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm nhanh..." style="width:100%; padding:14px; border-radius:10px; border:1px solid #cbd5e1; margin-bottom: 15px;">

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Thiết bị</th>
                <th>Mã CCDC</th>
                <th>S/N</th>
                <th>Vị trí</th>
                <th>QR</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<!-- KHU VỰC IN NHÃN -->
<div id="labelArea"></div>

<script>
    const STORAGE_KEY = 'atcc_inventory_final_v7';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentUser = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if (u === 'admin' && p === 'admin') currentUser = 'admin';
        else if (u === 'guest' && p === '123456') currentUser = 'guest';
        else return alert("Sai thông tin!");

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('displayUser').innerText = (u === 'admin' ? "Trần Văn Trường" : "Cán bộ trực");
        if (currentUser === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        render();
    }

    function addItem() {
        const name = document.getElementById('inName').value.trim();
        if(!name) return alert("Vui lòng nhập tên!");
        inventory.push({
            id: Date.now(),
            name: name,
            code: document.getElementById('inCode').value.trim() || "-",
            warehouse: document.getElementById('inWarehouse').value.trim() || "-",
            pn: document.getElementById('inPN').value.trim() || "-",
            sn: document.getElementById('inSN').value.trim() || "-",
            loc: document.getElementById('inLoc').value.trim() || "-"
        });
        saveData();
        ['inName','inCode','inWarehouse','inPN','inSN','inLoc'].forEach(id => document.getElementById(id).value = '');
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const lArea = document.getElementById('labelArea');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        tbody.innerHTML = '';
        lArea.innerHTML = '';

        const filtered = inventory.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(search)));

        filtered.forEach((item, idx) => {
            const qrBảng = `qrb-${item.id}`;
            const qrNhãn = `qrl-${item.id}`;

            // Render bảng chính
            tbody.innerHTML += `<tr>
                <td>${idx+1}</td>
                <td><b>${item.name}</b></td>
                <td>${item.code}</td>
                <td>${item.sn}</td>
                <td>${item.loc}</td>
                <td><div id="${qrBảng}" class="qr-container"></div></td>
                <td>
                    <button class="btn-del" onclick="deleteItem(${item.id})">🗑️ Xóa</button>
                </td>
            </tr>`;

            // Render khu vực in nhãn
            lArea.innerHTML += `
                <div class="label-item">
                    <div class="label-info">
                        ${item.name}<br>
                        Mã: ${item.code}<br>
                        S/N: ${item.sn}<br>
                        Vị trí: ${item.loc}
                    </div>
                    <div id="${qrNhãn}" class="label-qr"></div>
                </div>
            `;

            // Tạo QR sau khi Render
            setTimeout(() => {
                const qrText = `TB: ${item.name}\nSN: ${item.sn}\nCCDC: ${item.code}`;
                new QRCode(document.getElementById(qrBảng), { text: qrText, width: 45, height: 45 });
                new QRCode(document.getElementById(qrNhãn), { text: qrText, width: 80, height: 80 });
            }, 100);
        });
    }

    function deleteItem(id) {
        if (confirm("Anh có chắc chắn muốn xóa hàng dữ liệu này không?")) {
            inventory = inventory.filter(i => i.id !== id);
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
    }

    function printLabels() {
        document.body.className = "printing-labels";
        window.print();
    }

    function exportCSV() {
        let csv = "\ufeffSTT,Thiet Bi,Ma CCDC,S/N,Vi Tri\n";
        inventory.forEach((i, idx) => csv += `${idx+1},${i.name},${i.code},${i.sn},${i.loc}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `Vat_Tu_CNS_ATM.csv`; link.click();
    }

    function syncFromCloud() { alert("Chức năng đồng bộ yêu cầu URL Apps Script cụ thể."); }
    function printReport() { alert("Chức năng báo cáo SOP đang được tối ưu."); }
</script>
</body>
</html>
