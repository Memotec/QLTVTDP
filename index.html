<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATCCHCM - QUẢN LÝ THIẾT BỊ</title>
    <style>
        /* CSS giữ nguyên như bản trước để bạn dễ sử dụng */
        :root { --primary: #4338ca; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 5px; }
        .btn-add { width: 100%; background: var(--primary); color: white; padding: 15px; border-radius: 8px; border: none; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        .no-print { display: block; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h2>QUẢN LÝ THIẾT BỊ ATCCHCM</h2>
    <div class="card">
        <div class="form-grid">
            <div style="grid-column: span 2;">
                <label>Tên thiết bị</label>
                <input type="text" id="inName" value="PANASONIC KX-TS500">
            </div>
            <div>
                <label>Mã CCDC</label>
                <input type="text" id="inCode">
            </div>
            <div>
                <label>S/N</label>
                <input type="text" id="inSN">
            </div>
            <div style="grid-column: span 2;">
                <label>Vị trí</label>
                <input type="text" id="inLoc">
            </div>
        </div>
        <button class="btn-add" onclick="addItem()">THÊM THIẾT BỊ</button>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="window.print()" style="flex:1; background:#0f172a; color:white; padding:10px; border-radius:5px;">📄 XUẤT BẢNG IN</button>
            <button onclick="exportExcel()" style="flex:1; background:#10b981; color:white; padding:10px; border-radius:5px;">📁 LƯU FILE EXCEL</button>
        </div>
    </div>
</div>

<div id="mainContent">
    <table id="dataTable">
        <thead>
            <tr>
                <th>STT</th>
                <th>Thiết bị</th>
                <th>Mã CCDC</th>
                <th>S/N</th>
                <th>Vị trí</th>
                <th class="no-print">Xóa</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
    // Tên kho lưu trữ cố định
    const MASTER_KEY = 'atcc_master_db';
    const OLD_KEYS = ['atcc_v9_db', 'atcc_v10_db', 'atcc_db', 'atcc_permanent_database'];

    // HÀM TỰ ĐỘNG KHÔI PHỤC DỮ LIỆU LỖI
    function autoRecover() {
        let currentData = localStorage.getItem(MASTER_KEY);
        
        // Nếu kho mới trống, thử tìm trong các kho cũ
        if (!currentData || currentData === "[]") {
            for (let oldKey of OLD_KEYS) {
                let oldData = localStorage.getItem(oldKey);
                if (oldData && oldData !== "[]") {
                    console.log("Phát hiện dữ liệu tại: " + oldKey);
                    localStorage.setItem(MASTER_KEY, oldData);
                    return JSON.parse(oldData);
                }
            }
        }
        return JSON.parse(currentData) || [];
    }

    let inventory = autoRecover();

    function save() {
        localStorage.setItem(MASTER_KEY, JSON.stringify(inventory));
        render();
    }

    function addItem() {
        const item = {
            id: Date.now(),
            name: document.getElementById('inName').value,
            code: document.getElementById('inCode').value,
            sn: document.getElementById('inSN').value,
            loc: document.getElementById('inLoc').value
        };
        if(!item.code) return alert("Cần nhập mã CCDC!");
        inventory.push(item);
        save();
        document.getElementById('inCode').value = '';
        document.getElementById('inSN').value = '';
    }

    function deleteItem(id) {
        if(confirm("Xóa thiết bị này?")) {
            inventory = inventory.filter(i => i.id !== id);
            save();
        }
    }

    function render() {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        inventory.forEach((item, idx) => {
            tbody.innerHTML += `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.code}</td>
                    <td>${item.sn}</td>
                    <td>${item.loc}</td>
                    <td class="no-print"><button onclick="deleteItem(${item.id})">❌</button></td>
                </tr>
            `;
        });
    }

    function exportExcel() {
        let csv = "\ufeffSTT,Thiet Bi,Ma CCDC,SN,Vi Tri\n";
        inventory.forEach((item, idx) => {
            csv += `${idx+1},${item.name},${item.code},${item.sn},${item.loc}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "BAO_CAO_ATCC.csv";
        link.click();
    }

    render();
</script>
</body>
</html>
