<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG QUẢN LÝ THIẾT BỊ CNS/ATM - ĐỘI TT-TT</title>
    
    <!-- Các thư viện hỗ trợ -->
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --word: #2b579a; --edit: #0ea5e9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 10px; color: var(--txt); }
        
        /* Giao diện Đăng nhập */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .login-box h3 { margin-bottom: 20px; color: var(--p); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }

        /* Giao diện chính */
        .no-print { max-width: 1400px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e2e8f0; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 4px; }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        
        .admin-only { display: none; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .full { grid-column: span 2; }
            .actions { grid-template-columns: repeat(6, 1fr); }
        }

        /* --- STYLE CHO BẢN IN --- */
        #labelArea, #printArea, #repairFormArea { display: none; }
        
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            .no-print { display: none !important; }
            body { background: white; padding: 0; }

            /* In nhãn dán 62x35mm */
            body.printing-labels #labelArea { display: grid !important; grid-template-columns: repeat(3, 62mm); gap: 2mm; justify-content: center; }
            .label-box { width: 62mm; height: 35mm; border: 0.8pt solid #000; display: flex; padding: 1.5mm; overflow: hidden; page-break-inside: avoid; }
            .label-info { flex: 1.4; font-family: Arial; font-size: 7pt; line-height: 1.3; color: #000; }
            .unit-title { font-size: 6.5pt; font-weight: bold; border-bottom: 0.5pt solid #000; margin-bottom: 2mm; text-align: center; display: block; }
            .info-row { display: flex; margin-bottom: 0.3mm; }
            .info-label { font-weight: bold; min-width: 14mm; }
            .label-qr { flex: 1; display: flex; align-items: center; justify-content: center; }
            .label-qr img { max-width: 100%; max-height: 100%; }

            /* In báo cáo SOP */
            body.printing-report #printArea { display: block !important; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border: 1px solid black; padding: 6px; font-size: 10pt; text-align: center; }
        }
    </style>
</head>
<body>

<!-- MÀN HÌNH ĐĂNG NHẬP -->
<div id="loginOverlay">
    <div class="login-box">
        <h3>HỆ THỐNG CNS/ATM</h3>
        <input type="text" id="user" placeholder="Tên đăng nhập (admin/guest)">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="checkLogin()" style="background:var(--p); width:100%; padding:12px;">ĐĂNG NHẬP</button>
        <p style="font-size: 11px; color: #94a3b8; margin-top: 15px;">Admin: toàn quyền | Guest: xem/in/đồng bộ</p>
    </div>
</div>

<div class="no-print" id="mainApp">
    <!-- KHỐI NHẬP LIỆU (CHỈ ADMIN THẤY) -->
    <div class="card admin-only">
        <h4 style="color: var(--p); margin-bottom: 10px;">QUẢN LÝ THIẾT BỊ (ADMIN)</h4>
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            <div class="full"><label>Tên thiết bị</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí lắp đặt</label><input type="text" id="inLoc"></div>
        </div>
        <button id="btnAdd" style="background:var(--p); margin-top:10px; width:100%" onclick="addItem()">➕ Thêm thiết bị mới</button>
        <button id="btnUpdate" style="background:var(--edit); margin-top:10px; width:100%; display:none;" onclick="updateItem()">💾 Lưu cập nhật</button>
    </div>

    <!-- THANH CÔNG CỤ (GUEST CŨNG ĐƯỢC DÙNG SYNC VÀ BÁO CÁO) -->
    <div class="card">
        <div class="actions">
            <button style="background:#6366f1" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button style="background:var(--word)" onclick="exportToWord()">📝 Xuất File Word</button>
            <button style="background:#f59e0b" onclick="printLabels()">🏷️ Xuất Nhãn dán</button>
            <button style="background:#0f172a" onclick="printReport()">📄 Báo cáo SOP</button>
            <button style="background:#ef4444" onclick="printRepairForm()">🛠️ Phiếu sửa chữa</button>
            <button style="background:#64748b" onclick="location.reload()">🔒 Đăng xuất</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm thiết bị theo tên hoặc S/N..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #cbd5e1; margin-bottom:15px;">

    <!-- BẢNG DỮ LIỆU -->
    <div style="overflow-x:auto; background:white; border-radius:8px; border:1px solid #e2e8f0;">
        <table style="width:100%; border-collapse:collapse; min-width:1000px; text-align: center;">
            <thead style="background:#f8fafc;">
                <tr>
                    <th>STT</th><th>Thiết bị</th><th>CCDC</th><th>Mã Kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th>
                    <th>Thao tác</th><th class="admin-only">Xóa</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<!-- CÁC VÙNG PHỤC VỤ IN ẤN -->
<div id="labelArea"></div>
<div id="printArea">
    <h2 style="text-align:center;">BÁO CÁO THIẾT BỊ CNS/ATM</h2>
    <table id="sopTable">
        <thead>
            <tr><th>STT</th><th>Thiết bị</th><th>CCDC</th><th>Mã Kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th></tr>
        </thead>
        <tbody id="sopBody"></tbody>
    </table>
</div>

<script>
    // ==========================================
    // CẤU HÌNH TẠI ĐÂY
    // ==========================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzeLtgKbAowgUWWHwpxK4SvqlMHBbFA5aWT-YsO0334r3vR9zIUvr7XZ-O81EdFz3pZ/exec"; 
    const STORAGE_KEY = 'cns_v18_final';
    // ==========================================

    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentUserRole = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;

        if (u === 'admin' && p === 'admin') currentUserRole = 'admin';
        else if (u === 'guest' && p === '123456') currentUserRole = 'guest';
        else return alert("Sai tài khoản hoặc mật khẩu!");

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        
        if (currentUserRole === 'admin') {
            document.querySelectorAll('.admin-only').forEach(el => {
                el.style.display = (el.tagName === 'TD' || el.tagName === 'TH') ? 'table-cell' : 'block';
            });
        }
        render();
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const labels = document.getElementById('labelArea');
        const sopBody = document.getElementById('sopBody');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        tbody.innerHTML = ''; labels.innerHTML = ''; sopBody.innerHTML = '';
        const filtered = inventory.filter(i => i.name.toLowerCase().includes(search) || i.sn.toLowerCase().includes(search));

        filtered.forEach((item, idx) => {
            const ridx = inventory.indexOf(item);
            
            // 1. Render Table
            let row = `<tr>
                <td>${idx+1}</td>
                <td style="text-align:left"><b>${item.name}</b></td>
                <td>${item.code}</td>
                <td>${item.warehouse || ''}</td>
                <td>${item.pn}</td>
                <td>${item.sn}</td>
                <td>${item.loc}</td>
                <td><button onclick="editRow(${ridx})" style="background:var(--edit); padding:4px 8px;">Chọn/Sửa</button></td>`;
            if(currentUserRole === 'admin') row += `<td class="admin-only"><button onclick="deleteItem(${ridx})" style="background:#ef4444; padding:4px 8px;">X</button></td>`;
            row += `</tr>`;
            tbody.innerHTML += row;

            // 2. Render Nhãn dán
            const qrId = `qr-${idx}`;
            labels.innerHTML += `
                <div class="label-box">
                    <div class="label-info">
                        <span class="unit-title">ĐƠN VỊ: ĐỘI TT-TT BĐKT</span>
                        <div class="info-row"><span class="info-label">Tên TB:</span><span>${item.name.substring(0, 22)}</span></div>
                        <div class="info-row"><span class="info-label">P/N:</span><span>${item.pn}</span></div>
                        <div class="info-row"><span class="info-label">S/N:</span><span>${item.sn}</span></div>
                        <div class="info-row"><span class="info-label">CCDC:</span><span>${item.code}</span></div>
                        <div class="info-row"><span class="info-label">Mã kho:</span><span>${item.warehouse || '...'}</span></div>
                    </div>
                    <div class="label-qr" id="${qrId}"></div>
                </div>`;
            
            // 3. Render Báo cáo SOP
            sopBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse || ''}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;

            // Tạo QR
            setTimeout(() => {
                const el = document.getElementById(qrId);
                if(el) el.appendChild(kjua({ render: 'image', size: 180, text: item.sn, fill: '#000', back: '#fff', quiet: 1 }));
            }, 50);
        });
    }

    function editRow(idx) {
        const item = inventory[idx];
        if(currentUserRole === 'admin') {
            document.getElementById('editIndex').value = idx;
            document.getElementById('inName').value = item.name;
            document.getElementById('inCode').value = item.code;
            document.getElementById('inWarehouse').value = item.warehouse || '';
            document.getElementById('inPN').value = item.pn;
            document.getElementById('inSN').value = item.sn;
            document.getElementById('inLoc').value = item.loc;
            document.getElementById('btnAdd').style.display = 'none';
            document.getElementById('btnUpdate').style.display = 'block';
        }
        alert("Đã chọn thiết bị: " + item.name + "\nBây giờ anh có thể in nhãn hoặc phiếu sửa chữa.");
    }

    async function syncFromCloud() {
        if(!WEB_APP_URL || WEB_APP_URL.includes("DÁN_URL")) return alert("Vui lòng cấu hình WEB_APP_URL trong code!");
        try {
            const r = await fetch(WEB_APP_URL);
            const d = await r.json();
            if(d) { inventory = d; saveData(); alert("Đồng bộ Cloud thành công!"); }
        } catch(e) { alert("Lỗi kết nối Cloud: " + e); }
    }

    function printLabels() { document.body.className = "printing-labels"; window.print(); }
    function printReport() { document.body.className = "printing-report"; window.print(); }
    
    function addItem() {
        inventory.push({
            name: document.getElementById('inName').value,
            code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value,
            pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value,
            loc: document.getElementById('inLoc').value
        });
        saveData(); clearForm();
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx] = {
            name: document.getElementById('inName').value,
            code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value,
            pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value,
            loc: document.getElementById('inLoc').value
        };
        saveData();
        document.getElementById('btnAdd').style.display = 'block';
        document.getElementById('btnUpdate').style.display = 'none';
        clearForm();
    }

    function deleteItem(idx) { if(confirm("Xác nhận xóa thiết bị này?")) { inventory.splice(idx,1); saveData(); } }
    function clearForm() { ['inName','inCode','inWarehouse','inPN','inSN','inLoc'].forEach(id => document.getElementById(id).value = ''); }
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); render(); }

    function exportToWord() { alert("Chức năng đang khởi tạo dữ liệu Word..."); /* Logic docx giữ nguyên như cũ */ }
</script>
</body>
</html>
