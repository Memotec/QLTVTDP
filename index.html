<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ - ATCCHCM</title>
    <!-- Thư viện tạo QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 4px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; transition: 0.2s; }
        .btn-add { grid-column: span 2; background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-excel { background: #10b981; }
        .btn-print { background: #0f172a; grid-column: span 2; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        thead { display: none; }
        tbody tr { display: block; background: white; border-radius: 10px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; position: relative; }
        tbody td { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; align-items: center; }
        tbody td:last-child { border: none; }
        tbody td::before { content: attr(data-label); font-weight: 700; color: #94a3b8; font-size: 11px; }
        
        .qr-box img { border: 2px solid #fff; border-radius: 4px; width: 60px; height: 60px; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(4, 1fr); }
            .full { grid-column: auto; }
            thead { display: table-header-group; text-align: left; }
            tbody tr { display: table-row; }
            tbody td { display: table-cell; border-bottom: 1px solid #e2e8f0; padding: 15px; }
            tbody td::before { display: none; }
            .actions { grid-template-columns: repeat(4, 1fr); }
            .btn-add, .btn-print { grid-column: auto; }
        }

        @media print { 
            .no-print { display: none !important; } 
            #printArea { display: block !important; padding: 20px; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000; padding: 8px; text-align: center; }
        }
        #printArea { display: none; }
    </style>
</head>
<body>

<div class="no-print">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>ATCCHCM - QUẢN LÝ</h2>
        <small>Xin chào, <b>Trần Văn Trường</b></small>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="full"><label>Thiết bị</label><input type="text" id="inName" value="PANASONIC KX-TS500"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode" placeholder="..."></div>
            <div><label>Số S/N</label><input type="text" id="inSN" placeholder="..."></div>
            <div class="full"><label>Vị trí</label><input type="text" id="inLoc" placeholder="..."></div>
        </div>
        
        <div class="actions">
            <button class="btn-add" onclick="addItem()">➕ Thêm & Lưu Cloud</button>
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ từ Cloud</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Xuất Excel</button>
            <button class="btn-print" onclick="window.print()">📄 In Báo Cáo</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm nhanh theo tên, mã hoặc vị trí..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom: 10px;">

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Thiết bị</th>
                <th>Mã CCDC</th>
                <th>S/N</th>
                <th>Vị trí</th>
                <th>Mã QR</th>
                <th>Xóa</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<!-- Vùng In -->
<div id="printArea">
    <h2 style="text-align: center;">DANH MỤC THIẾT BỊ ĐIỆN THOẠI - ATCCHCM</h2>
    <p id="printDate" style="text-align: right; font-style: italic;"></p>
    <table id="printTable" style="margin-top: 20px;"></table>
</div>

<script>
    const STORAGE_KEY = 'atcc_qr_master_v1';
    const URL_APPS_SCRIPT = "DÁN_URL_WEB_APP_CỦA_ANH_VÀO_ĐÂY"; 
    const PASS_KEY = "123456";

    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // Lưu dữ liệu
    async function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return;
        try {
            await fetch(URL_APPS_SCRIPT, { method: "POST", mode: "no-cors", body: JSON.stringify(inventory) });
        } catch (e) { console.error("Cloud Error", e); }
    }

    // Thêm mới
    function addItem() {
        const name = document.getElementById('inName').value;
        const code = document.getElementById('inCode').value;
        const sn = document.getElementById('inSN').value;
        const loc = document.getElementById('inLoc').value;
        if(!code) return alert("Cần nhập mã CCDC!");
        
        inventory.push({ id: Date.now(), name, code, sn, loc });
        save();
        document.getElementById('inCode').value = '';
        document.getElementById('inSN').value = '';
    }

    // Đồng bộ từ Cloud
    async function syncFromCloud() {
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return alert("Chưa có URL Apps Script!");
        try {
            const res = await fetch(URL_APPS_SCRIPT);
            const data = await res.json();
            if (data) {
                inventory = data.map(d => ({...d, id: d.id || Date.now() + Math.random()}));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
                render();
                alert("Đã đồng bộ xong!");
            }
        } catch (e) { alert("Lỗi kết nối!"); }
    }

    // Xóa từng hàng
    async function deleteItem(id) {
        const item = inventory.find(i => i.id === id);
        if(!item || !confirm(`Xóa hàng: ${item.name}?`)) return;
        if(prompt("Mật khẩu xóa:") !== PASS_KEY) return alert("Sai mật khẩu!");

        // Xóa trên Cloud (đích danh mã CCDC)
        if (!URL_APPS_SCRIPT.includes("DÁN_URL")) {
            fetch(URL_APPS_SCRIPT, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ action: "DELETE_ROW", code: item.code })
            });
        }

        inventory = inventory.filter(i => i.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
    }

    // Render bảng & QR
    function render() {
        const tbody = document.getElementById('mainTable');
        const q = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';
        
        const filtered = inventory.filter(i => 
            i.name.toLowerCase().includes(q) || i.code.toLowerCase().includes(q) || i.loc.toLowerCase().includes(q)
        );

        filtered.forEach((item, idx) => {
            const qrId = `qr-${item.id}`;
            tbody.innerHTML += `
                <tr>
                    <td data-label="STT">${idx + 1}</td>
                    <td data-label="Thiết bị"><b>${item.name}</b></td>
                    <td data-label="Mã">${item.code}</td>
                    <td data-label="S/N">${item.sn || '-'}</td>
                    <td data-label="Vị trí">${item.loc || '-'}</td>
                    <td data-label="Mã QR"><div id="${qrId}" class="qr-box"></div></td>
                    <td data-label="Xóa"><span style="cursor:pointer" onclick="deleteItem(${item.id})">🗑️</span></td>
                </tr>
            `;

            // Nội dung QR
            const qrText = `Tên: ${item.name}\nMã: ${item.code}\nSN: ${item.sn}\nVT: ${item.loc}`;
            setTimeout(() => {
                new QRCode(document.getElementById(qrId), { text: qrText, width: 60, height: 60 });
            }, 50);
        });

        // Cập nhật vùng in
        const pTable = document.getElementById('printTable');
        document.getElementById('printDate').innerText = "Ngày in: " + new Date().toLocaleDateString('vi-VN');
        pTable.innerHTML = `<tr><th>STT</th><th>Thiết bị</th><th>Mã CCDC</th><th>S/N</th><th>Vị trí</th></tr>`;
        filtered.forEach((i, idx) => {
            pTable.innerHTML += `<tr><td>${idx+1}</td><td>${i.name}</td><td>${i.code}</td><td>${i.sn}</td><td>${i.loc}</td></tr>`;
        });
    }

    function exportCSV() {
        let csv = "\ufeffSTT,Thiet Bi,Ma CCDC,SN,Vi Tri\n";
        inventory.forEach((i, idx) => csv += `${idx+1},${i.name},${i.code},${i.sn},${i.loc}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = "ThietBi_ATCC.csv";
        link.click();
    }

    render();
</script>
</body>
</html>
