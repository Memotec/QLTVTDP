<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - TRẦN VĂN TRƯỜNG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 15px; }
        .no-print { max-width: 1250px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; margin-top: 4px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1); }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; transition: 0.2s; }
        .btn-add { grid-column: span 2; background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-excel { background: #10b981; }
        .btn-label { background: #f59e0b; } /* Màu vàng cam cho nút nhãn dán */
        .btn-print { background: #0f172a; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        thead { display: none; }
        tbody tr { display: block; background: white; border-radius: 10px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        tbody td { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; align-items: center; }
        tbody td:last-child { border: none; }
        tbody td::before { content: attr(data-label); font-weight: 700; color: #94a3b8; font-size: 11px; }

        .qr-container { background: #fff; padding: 5px; border: 1px solid #eee; border-radius: 4px; }
        .qr-container canvas, .qr-container img { display: block; margin: 0 auto; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .full { grid-column: span 2; }
            thead { display: table-header-group; text-align: center; }
            tbody tr { display: table-row; }
            tbody td { display: table-cell; border-bottom: 1px solid #e2e8f0; padding: 12px; text-align: center; vertical-align: middle; }
            tbody td::before { display: none; }
            .actions { grid-template-columns: repeat(4, 1fr); }
            .btn-add { grid-column: span 1; }
        }

        /* PHẦN IN BÁO CÁO VÀ NHÃN DÁN */
        #printArea, #labelArea { display: none; }

        @media print {
            .no-print { display: none !important; }
            
            /* Style cho Báo cáo A4 */
            body.printing-report #printArea { display: block !important; padding: 0; background: #fff; }
            
            /* Style cho Nhãn dán */
            body.printing-labels #labelArea { 
                display: grid !important; 
                grid-template-columns: repeat(3, 1fr); 
                gap: 10px; 
                padding: 10px;
            }
            .label-item { 
                border: 1px solid #000; 
                padding: 5px; 
                display: flex; 
                align-items: center; 
                height: 120px; 
                overflow: hidden;
                page-break-inside: avoid;
            }
            .label-info { flex: 1; font-size: 10px; line-height: 1.2; font-weight: bold; }
            .label-qr { width: 70px; height: 70px; }

            #printTable { width: 100%; border-collapse: collapse; }
            #printTable th, #printTable td { border: 1px solid #000; padding: 6px; font-size: 11px; text-align: center; }
            .sig-section { display: flex; justify-content: space-between; margin-top: 30px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: var(--p);">THỐNG KÊ THIẾT BỊ CNS/ATM</h2>
        <div style="font-size: 12px; background: #fff; padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd;">
            Kỹ thuật viên: <b>Trần Văn Trường</b>
        </div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="full"><label>Tên thiết bị / Model</label><input type="text" id="inName" placeholder="Tên thiết bị..."></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode" placeholder="..."></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse" placeholder="..."></div>
            <div><label>P/N</label><input type="text" id="inPN" placeholder="..."></div>
            <div><label>S/N</label><input type="text" id="inSN" placeholder="..."></div>
            <div class="full"><label>Vị trí lắp đặt</label><input type="text" id="inLoc" placeholder="..."></div>
        </div>
        
        <div class="actions">
            <button class="btn-add" onclick="addItem()">➕ Thêm mới</button>
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Xuất Excel</button>
            <button class="btn-label" onclick="printLabels()">🖨️ Xuất nhãn dán</button>
            <button class="btn-print" onclick="printReport()">📄 In Báo Cáo</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm nhanh..." style="width:100%; padding:14px; border-radius:8px; border:1px solid #cbd5e1; margin-bottom: 15px;">

    <table>
        <thead>
            <tr>
                <th style="width: 40px;">STT</th>
                <th>Thiết bị / Model</th>
                <th>Mã CCDC</th>
                <th>Mã Kho</th>
                <th>P/N</th>
                <th>S/N</th>
                <th>Vị trí</th>
                <th style="width: 100px;">QR Code</th>
                <th style="width: 50px;">Xóa</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<!-- KHU VỰC IN BÁO CÁO -->
<div id="printArea">
    <div style="text-align: center; margin-bottom: 20px;">
        <p style="font-weight: bold;">TRUNG TÂM BẢO ĐẢM KỸ THUẬT - ĐỘI THÔNG TIN</p>
        <br>
        <h2>DANH MỤC QUẢN LÝ THIẾT BỊ CNS/ATM</h2>
        <p id="printDate" style="font-style: italic;"></p>
    </div>
    <table id="printTable">
        <thead>
            <tr>
                <th>STT</th>
                <th>Thiết bị</th>
                <th>Mã CCDC</th>
                <th>Mã Kho</th>
                <th>P/N</th>
                <th>S/N</th>
                <th>Vị trí</th>
            </tr>
        </thead>
        <tbody id="printTableBody"></tbody>
    </table>
    <div class="sig-section">
        <div style="text-align: center; width: 40%;"><b>PHỤ TRÁCH ĐƠN VỊ</b></div>
        <div style="text-align: center; width: 40%;"><b>NGƯỜI LẬP BIỂU</b><br><br><br><br><b>TRẦN VĂN TRƯỜNG</b></div>
    </div>
</div>

<!-- KHU VỰC IN NHÃN DÁN (LABEL) -->
<div id="labelArea"></div>

<script>
    const STORAGE_KEY = 'atcc_inventory_v5';
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbz3g8qLp38h2DYVp6Y5FCsur1h-TsEwJ5Y6_D3oVtTu8M_rpZD1tviNG3tcu3ex-LLu/exec"; 
    const PASS_KEY = "123456";

    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    async function saveAll() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return;
        try {
            await fetch(URL_APPS_SCRIPT, { method: "POST", mode: "no-cors", body: JSON.stringify(inventory) });
        } catch (e) { console.error(e); }
    }

    function addItem() {
        const name = document.getElementById('inName').value;
        const code = document.getElementById('inCode').value;
        const warehouse = document.getElementById('inWarehouse').value;
        const pn = document.getElementById('inPN').value;
        const sn = document.getElementById('inSN').value;
        const loc = document.getElementById('inLoc').value;
        
        if(!code || !name) return alert("Vui lòng nhập Tên và Mã CCDC!");
        inventory.push({ id: Date.now(), name, code, warehouse, pn, sn, loc });
        saveAll();
        ['inName','inCode','inWarehouse','inPN','inSN','inLoc'].forEach(id => document.getElementById(id).value = '');
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        const lArea = document.getElementById('labelArea');
        const q = document.getElementById('searchInput').value.toLowerCase();
        
        tbody.innerHTML = ''; pBody.innerHTML = ''; lArea.innerHTML = '';
        const filtered = inventory.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(q)));

        filtered.forEach((item, idx) => {
            const qrId = `qr-${item.id}`;
            const qrIdLabel = `qr-l-${item.id}`;

            tbody.innerHTML += `
                <tr>
                    <td data-label="STT">${idx+1}</td>
                    <td data-label="Thiết bị"><b>${item.name}</b></td>
                    <td data-label="Mã CCDC">${item.code}</td>
                    <td data-label="Mã Kho">${item.warehouse || '-'}</td>
                    <td data-label="P/N">${item.pn || '-'}</td>
                    <td data-label="S/N">${item.sn || '-'}</td>
                    <td data-label="Vị trí">${item.loc || '-'}</td>
                    <td data-label="QR Code"><div id="${qrId}" class="qr-container"></div></td>
                    <td data-label="Xóa"><span style="cursor:pointer; color:var(--danger);" onclick="deleteItem(${item.id})">🗑️</span></td>
                </tr>`;
            
            pBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;

            // Tạo khung nhãn dán cho phần in nhãn
            lArea.innerHTML += `
                <div class="label-item">
                    <div class="label-info">
                        Tên: ${item.name}<br>
                        CCDC: ${item.code}<br>
                        P/N: ${item.pn || '-'}<br>
                        S/N: ${item.sn || '-'}
                    </div>
                    <div id="${qrIdLabel}" class="label-qr"></div>
                </div>`;

            setTimeout(() => {
                const content = `Thiết bị: ${item.name}\nMã CCDC: ${item.code}\nMã kho: ${item.warehouse || '-'}\nP/N: ${item.pn || '-'}\nS/N: ${item.sn || '-'}\nVị trí: ${item.loc || '-'}`;
                
                // Vẽ QR cho bảng web
                if(document.getElementById(qrId)) {
                    new QRCode(document.getElementById(qrId), { text: content, width: 80, height: 80, correctLevel: QRCode.CorrectLevel.H });
                }
                // Vẽ QR cho nhãn dán
                if(document.getElementById(qrIdLabel)) {
                    new QRCode(document.getElementById(qrIdLabel), { text: content, width: 65, height: 65, correctLevel: QRCode.CorrectLevel.H });
                }
            }, 300);
        });
        document.getElementById('printDate').innerText = "Ngày: " + new Date().toLocaleDateString('vi-VN');
    }

    function printReport() {
        document.body.className = "printing-report";
        window.print();
    }

    function printLabels() {
        document.body.className = "printing-labels";
        window.print();
    }

    function deleteItem(id) {
        if(!confirm(`Xác nhận xóa?`)) return;
        if(prompt("Nhập mật khẩu:") !== PASS_KEY) return alert("Sai!");
        inventory = inventory.filter(i => i.id !== id);
        saveAll();
    }

    function exportCSV() {
        let csv = "\ufeffSTT,Thiet Bi,Ma CCDC,Ma Kho,PN,SN,Vi Tri\n";
        inventory.forEach((i, idx) => csv += `${idx+1},${i.name},${i.code},${i.warehouse},${i.pn},${i.sn},${i.loc}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `Bao_cao_CNS.csv`;
        link.click();
    }

    async function syncFromCloud() {
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return alert("Chưa nhập URL!");
        try {
            const res = await fetch(URL_APPS_SCRIPT);
            const data = await res.json();
            if (data) {
                inventory = data.map(d => ({...d, id: d.id || Date.now()+Math.random()}));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
                render();
                alert("Đồng bộ hoàn tất!");
            }
        } catch (e) { alert("Lỗi kết nối Cloud!"); }
    }

    render();
</script>
</body>
</html>
