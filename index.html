<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG QUẢN LÝ THIẾT BỊ CNS/ATM</title>
    <!-- Thư viện tạo QR và Word -->
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --edit: #0ea5e9; --word: #2b579a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        .no-print { max-width: 1400px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 4px; outline: none; }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; transition: 0.2s; }
        .btn-add { background: var(--p); width: 100%; margin-top: 10px; }
        .btn-update { background: var(--edit); width: 100%; margin-top: 10px; display: none; }
        
        .btn-sync { background: #6366f1; }
        .btn-word { background: var(--word); }
        .btn-label { background: var(--warning); }
        .btn-print { background: #0f172a; }
        .btn-logout { background: #64748b; }

        .table-container { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background: #f8fafc; font-size: 11px; text-transform: uppercase; color: #64748b; }
        
        .admin-only { display: none; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .full { grid-column: span 2; }
            .actions { grid-template-columns: repeat(5, 1fr); }
        }

        /* PRINT STYLES */
        #printArea, #labelArea { display: none; }
        @media print {
            @page { size: A4 portrait; margin: 10mm 15mm; }
            .no-print, #loginOverlay { display: none !important; }
            body { background: white; padding: 0; font-family: "Times New Roman", serif; }
            body.printing-report #printArea { display: block !important; }
            table { width: 100%; border-collapse: collapse; border: 1px solid black; }
            th, td { border: 1px solid black; padding: 5px; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>HỆ THỐNG QUẢN LÝ CNS</h3>
        <input type="text" id="user" placeholder="Tài khoản">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button class="btn-add" onclick="checkLogin()">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="no-print" id="mainApp">
    <div class="card admin-only">
        <h4 id="formTitle" style="font-size: 12px; color: var(--p); margin-bottom: 10px;">THÊM THIẾT BỊ MỚI</h4>
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            <div class="full"><label>Tên thiết bị</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí</label><input type="text" id="inLoc"></div>
        </div>
        <button id="btnAdd" class="btn-add" onclick="addItem()">➕ Thêm thiết bị</button>
        <button id="btnUpdate" class="btn-update" onclick="updateItem()">💾 Cập nhật thay đổi</button>
    </div>

    <div class="card">
        <div class="actions">
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ</button>
            <button class="btn-word" onclick="exportToWord()">📝 Xuất Word</button>
            <button class="btn-label" onclick="printLabels()">🏷️ In Nhãn QR</button>
            <button class="btn-print" onclick="printReport()">📄 In Báo cáo</button>
            <button class="btn-logout" onclick="location.reload()">🔒 Thoát</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm..." style="width:100%; padding:14px; border-radius:10px; border:1px solid #cbd5e1; margin-bottom: 15px;">

    <div class="table-container">
        <table>
            <thead>
                <tr><th>STT</th><th>Thiết bị</th><th>Mã CCDC</th><th>P/N</th><th>S/N</th><th>Vị trí</th><th>Sửa</th><th class="admin-only">Xóa</th></tr>
            </thead>
            <tbody id="mainTable"></tbody>
        </table>
    </div>
</div>

<!-- VÙNG IN BÁO CÁO (HTML) -->
<div id="printArea">
    <h2 style="text-align: center; text-transform: uppercase;">BẢNG THỐNG KÊ THIẾT BỊ KỸ THUẬT</h2>
    <table id="sopTablePrint">
        <thead>
            <tr><th>STT</th><th>Tên thiết bị</th><th>Mã CCDC</th><th>P/N</th><th>S/N</th><th>Vị trí</th></tr>
        </thead>
        <tbody id="printTableBody"></tbody>
    </table>
</div>

<script>
    const STORAGE_KEY = 'cns_word_v12';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentUser = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        if (u === 'admin') currentUser = 'admin';
        else currentUser = 'guest';
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        render();
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        const search = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = ''; pBody.innerHTML = '';

        inventory.filter(i => i.name.toLowerCase().includes(search)).forEach((item, idx) => {
            tbody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td><td><button onclick="editRow(${idx})" style="background:var(--edit); color:white; border:none; padding:4px 8px; border-radius:4px;">Sửa</button></td><td class="admin-only"><button onclick="deleteItem(${idx})" style="background:var(--danger); color:white; border:none; padding:4px 8px; border-radius:4px;">X</button></td></tr>`;
            pBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;
        });
        if (currentUser === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'table-cell');
    }

    function addItem() {
        const item = { name: document.getElementById('inName').value, code: document.getElementById('inCode').value, pn: document.getElementById('inPN').value, sn: document.getElementById('inSN').value, loc: document.getElementById('inLoc').value };
        inventory.push(item); saveData(); clearForm();
    }

    function editRow(idx) {
        const item = inventory[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = item.name;
        document.getElementById('inSN').value = item.sn;
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx] = { name: document.getElementById('inName').value, sn: document.getElementById('inSN').value, code: document.getElementById('inCode').value, pn: document.getElementById('inPN').value, loc: document.getElementById('inLoc').value };
        saveData(); cancelEdit();
    }

    function cancelEdit() { document.getElementById('btnAdd').style.display = 'block'; document.getElementById('btnUpdate').style.display = 'none'; clearForm(); }
    function clearForm() { ['inName','inCode','inPN','inSN','inLoc'].forEach(id => document.getElementById(id).value = ''); }
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); render(); }
    function printReport() { document.body.className = "printing-report"; window.print(); }

    // --- CHỨC NĂNG XUẤT WORD CHUYÊN NGHIỆP ---
    function exportToWord() {
        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, AlignmentType, BorderStyle } = docx;
        const d = new Date();
        const dateStr = `Hồ Chí Minh, ngày ${d.getDate()} tháng ${d.getMonth() + 1} năm ${d.getFullYear()}`;

        const tableRows = [
            new TableRow({
                children: ["STT", "Tên thiết bị / Model", "Mã CCDC", "P/N", "S/N", "Vị trí lắp đặt"].map(text => 
                    new TableCell({
                        children: [new Paragraph({ children: [new TextRun({ text, bold: true, size: 22 })], alignment: AlignmentType.CENTER })],
                        shading: { fill: "E7E7E7" }
                    })
                ),
            }),
        ];

        inventory.forEach((item, idx) => {
            tableRows.push(new TableRow({
                children: [ (idx + 1).toString(), item.name, item.code, item.pn, item.sn, item.loc ].map(text => 
                    new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: text || "-", size: 20 })], alignment: AlignmentType.CENTER })] })
                ),
            }));
        });

        const doc = new Document({
            sections: [{
                properties: {},
                children: [
                    new Paragraph({
                        children: [
                            new TextRun({ text: "TỔNG CÔNG TY QUẢN LÝ BAY VIỆT NAM", bold: true, size: 24 }),
                            new TextRun({ text: "\t\tCỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM", bold: true, size: 24, break: 1 }),
                            new TextRun({ text: "TRUNG TÂM BẢO ĐẢM KỸ THUẬT", bold: true, size: 22, break: 1 }),
                            new TextRun({ text: "\t\t\tĐộc lập - Tự do - Hạnh phúc", bold: true, size: 22 }),
                            new TextRun({ text: "ĐỘI THÔNG TIN", bold: true, size: 22, underline: {}, break: 1 }),
                            new TextRun({ text: `\t\t\t\t\t${dateStr}`, italics: true, size: 22 }),
                        ],
                    }),
                    new Paragraph({ children: [new TextRun({ text: "BẢNG THỐNG KÊ THIẾT BỊ KỸ THUẬT", bold: true, size: 32, break: 2 })], alignment: AlignmentType.CENTER }),
                    new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: tableRows }),
                    new Paragraph({
                        children: [
                            new TextRun({ text: "NGƯỜI LẬP BIỂU\t\t\tĐỘI TRƯỞNG PHÊ DUYỆT\t\tXÁC NHẬN ĐƠN VỊ", bold: true, size: 22, break: 2 }),
                            new TextRun({ text: "(Ký và ghi rõ họ tên)\t\t\t(Ký và ghi rõ họ tên)\t\t\t(Ký tên, đóng dấu)", italics: true, size: 18, break: 1 }),
                            new TextRun({ text: "Trần Văn Trường", bold: true, size: 22, break: 6 }),
                        ],
                        alignment: AlignmentType.CENTER
                    }),
                ],
            }],
        });

        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `Bao_cao_thiet_bi_${d.getDate()}_${d.getMonth()+1}.docx`);
        });
    }
</script>
</body>
</html>
