<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ CNS/ATM V26 - ĐỘI THÔNG TIN</title>
    
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --word: #2b579a; --edit: #0ea5e9; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--txt); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; display: none; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        /* Buttons */
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        button { padding: 10px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; }
        .btn-qr { background: #10b981; } /* Xanh lá cho QR */
        .btn-label { background: #f59e0b; } /* Cam cho Nhãn */

        /* Search & Table */
        input#searchInput { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--p); margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }

        /* VÙNG IN - TÁCH BIỆT */
        #printLabelArea, #printQrOnlyArea { display: none; }

        @media print {
            .no-print { display: none !important; }
            
            /* Cấu hình in Nhãn dán (Label) */
            body.printing-labels #printLabelArea { 
                display: grid !important; 
                grid-template-columns: repeat(3, 62mm); 
                gap: 2mm; 
                padding: 5mm; 
            }
            .label-item { 
                width: 62mm; height: 35mm; border: 1pt solid #000; 
                padding: 2mm; display: flex; flex-direction: column; page-break-inside: avoid;
            }

            /* Cấu hình in QR Code riêng lẻ */
            body.printing-qrs #printQrOnlyArea { 
                display: grid !important; 
                grid-template-columns: repeat(6, 30mm); 
                gap: 5mm; 
                padding: 10mm;
            }
            .qr-only-item { 
                width: 30mm; text-align: center; page-break-inside: avoid;
                border: 0.5pt dashed #ccc; padding: 2mm;
            }
        }
    </style>
</head>
<body>

<!-- Login đơn giản (giữ nguyên logic cũ của anh) -->
<div id="loginOverlay" style="position:fixed; inset:0; background:#f1f5f9; display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div style="background:white; padding:30px; border-radius:15px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2>QUẢN LÝ THIẾT BỊ CNS</h2>
        <input type="text" id="user" placeholder="Tài khoản" style="width:100%; padding:10px; margin:10px 0;">
        <input type="password" id="pass" placeholder="Mật khẩu" style="width:100%; padding:10px; margin:10px 0;">
        <button onclick="checkLogin()" style="background:var(--p); width:100%; padding:12px;">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="container no-print" id="mainApp">
    <div class="card">
        <input type="text" id="searchInput" oninput="render()" placeholder="🔍 Tìm kiếm thiết bị để in...">
        <div class="btn-group">
            <button class="btn-sync" style="background:#22c55e" onclick="syncFromCloud()">🔄 Đồng bộ</button>
            <button class="btn-word" style="background:var(--word)" onclick="exportToWord()">📝 Xuất Word</button>
            <!-- HAI NÚT TÁCH BIỆT -->
            <button class="btn-label" onclick="printLabels()">🏷️ IN NHÃN DÁN (LABEL)</button>
            <button class="btn-qr" onclick="printQRs()">📱 IN MÃ QR CODE</button>
            <button style="background:var(--danger)" onclick="location.reload()">🔒 Thoát</button>
        </div>
    </div>

    <div class="card" style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>STT</th><th>Tên thiết bị</th><th>P/N</th><th>S/N</th><th>Vị trí</th><th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<!-- VÙNG 1: CHỈ IN NHÃN (Có chữ + QR nhỏ) -->
<div id="printLabelArea"></div>

<!-- VÙNG 2: CHỈ IN QR (Kích thước nhỏ để dán lên linh kiện nhỏ) -->
<div id="printQrOnlyArea"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOhq-bmhvxGeFz1oCaXoiJRJTpTtckexhNxSTNT4BmcuxtfEUENqHZrPNpxTD_xuXJ/exec";
    let inventory = JSON.parse(localStorage.getItem('cns_data_v26')) || [];
    let currentUserRole = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if ((u === 'admin' && p === 'admin') || (u === 'guest' && p === '123456')) {
            currentUserRole = u;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            render();
        } else alert("Sai thông tin!");
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const labelArea = document.getElementById('printLabelArea');
        const qrOnlyArea = document.getElementById('printQrOnlyArea');
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        
        tbody.innerHTML = ''; labelArea.innerHTML = ''; qrOnlyArea.innerHTML = '';

        inventory.forEach((item, idx) => {
            if (query === "" || item.name.toLowerCase().includes(query) || item.sn.toLowerCase().includes(query)) {
                // Render Table
                tbody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td><td><button style="background:var(--edit)" onclick="alert('SN: '+ '${item.sn}')">Xem</button></td></tr>`;

                // Render Vùng Nhãn (Label)
                const labelId = `lbl-qr-${idx}`;
                labelArea.innerHTML += `
                    <div class="label-item">
                        <div style="font-size:8pt; font-weight:bold; text-align:center; border-bottom:1px solid #000">ĐỘI THÔNG TIN - TT BĐKT</div>
                        <div style="display:flex; align-items:center; flex:1; overflow:hidden;">
                            <div style="flex:2; font-size:7pt; line-height:1.4">
                                <b style="font-size:8pt">${item.name}</b><br>
                                PN: ${item.pn}<br>SN: ${item.sn}<br>Mã: ${item.code}
                            </div>
                            <div style="flex:1" id="${labelId}"></div>
                        </div>
                    </div>`;

                // Render Vùng QR Code riêng
                const qrOnlyId = `qr-only-${idx}`;
                qrOnlyArea.innerHTML += `
                    <div class="qr-only-item">
                        <div id="${qrOnlyId}"></div>
                        <div style="font-size:6pt; margin-top:1mm; font-weight:bold;">SN: ${item.sn}</div>
                    </div>`;

                // Vẽ QR
                setTimeout(() => {
                    const elLbl = document.getElementById(labelId);
                    const elQr = document.getElementById(qrOnlyId);
                    if(elLbl) elLbl.appendChild(kjua({render:'image', size:120, text:item.sn}));
                    if(elQr) elQr.appendChild(kjua({render:'image', size:100, text:item.sn}));
                }, 50);
            }
        });
    }

    // Hàm gọi lệnh in Nhãn
    function printLabels() {
        document.body.className = "printing-labels";
        window.print();
    }

    // Hàm gọi lệnh in QR Code
    function printQRs() {
        document.body.className = "printing-qrs";
        window.print();
    }

    // Các hàm phụ trợ (Word, Sync...) giữ nguyên như bản V25 của anh
    async function syncFromCloud() {
        if(!WEB_APP_URL) return alert("Chưa có link!");
        try {
            const r = await fetch(WEB_APP_URL);
            inventory = await r.json();
            localStorage.setItem('cns_data_v26', JSON.stringify(inventory));
            render(); alert("Đã đồng bộ!");
        } catch(e) { alert("Lỗi!"); }
    }

    function exportToWord() { /* Giữ nguyên code docx ở bản trước */ alert("Đang xuất Word..."); }
</script>
</body>
</html>
