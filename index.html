<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - TRẦN VĂN TRƯỜNG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        
        .no-print { max-width: 1400px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 4px; outline: none; }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; transition: 0.2s; }
        .btn-add { background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-excel { background: #10b981; }
        .btn-label { background: #f59e0b; }
        .btn-print { background: #0f172a; }
        .btn-row-repair { background: #ec4899; padding: 5px 10px; font-size: 11px; }

        .table-container { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background: #f8fafc; font-size: 11px; text-transform: uppercase; color: #64748b; }
        
        .admin-only { display: none; }
        .qr-container { background: #fff; padding: 5px; border: 1px solid #eee; display: inline-block; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .full { grid-column: span 2; }
            .actions { grid-template-columns: repeat(5, 1fr); }
        }

        /* --- PRINT STYLES --- */
        #printArea, #labelArea, #singleRepairArea { display: none; }
        @media print {
            @page { size: A4 portrait; margin: 15mm; }
            .no-print, #loginOverlay { display: none !important; }
            body { background: white; padding: 0; color: black; }
            
            /* In Báo cáo SOP */
            body.printing-report { width: 100%; }
            body.printing-report #printArea { display: block !important; }
            .sop-header { display: flex; justify-content: space-between; margin-bottom: 20px; text-align: center; font-weight: bold; font-size: 10pt; }
            
            /* In Phiếu báo SD thiết bị (Chuẩn SOP) */
            body.printing-repair #singleRepairArea { display: block !important; }
            .repair-paper { border: 1.5pt solid black; padding: 40px; height: 100%; position: relative; }
            .repair-title-box { text-align: center; margin-bottom: 30px; border-bottom: 2px solid black; padding-bottom: 10px; }
            .repair-title-box h2 { font-size: 18pt; margin-bottom: 5px; }
            .repair-content { font-size: 12pt; line-height: 2; }
            .dotted-line { border-bottom: 1px dotted black; flex-grow: 1; margin-left: 10px; }
            .info-row { display: flex; align-items: baseline; margin-bottom: 15px; }
            .repair-footer { margin-top: 50px; display: grid; grid-template-columns: 1fr 1fr; text-align: center; }
            .footer-sign { height: 100px; }

            /* In Nhãn */
            body.printing-labels #labelArea { display: grid !important; grid-template-columns: repeat(3, 60mm); gap: 5mm; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>HỆ THỐNG QUẢN LÝ CNS/ATM</h3>
        <input type="text" id="user" placeholder="Admin">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button class="btn-add" style="width: 100%; margin-top: 15px;" onclick="checkLogin()">Đăng nhập</button>
    </div>
</div>

<div class="no-print" id="mainApp">
    <div class="card admin-only">
        <div class="form-grid">
            <div class="full"><label>Tên thiết bị / Model</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí lắp đặt</label><input type="text" id="inLoc"></div>
        </div>
        <button id="btnAdd" class="btn-add" style="width:100%; margin-top:10px;" onclick="addItem()">➕ Thêm thiết bị & Ghi vào Sheet</button>
    </div>

    <div class="card">
        <div class="actions">
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Xuất Excel</button>
            <button class="btn-label" onclick="printLabels()">🏷️ In Nhãn</button>
            <button class="btn-print" onclick="printReport()">📄 Báo cáo SOP</button>
            <button class="btn-logout" onclick="location.reload()">🔒 Đăng xuất</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm nhanh..." style="width:100%; padding:14px; border-radius:10px; border:1px solid #cbd5e1; margin-bottom: 15px;">

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Thiết bị</th>
                    <th>Mã CCDC</th>
                    <th>Mã Kho</th>
                    <th>P/N</th>
                    <th>S/N</th>
                    <th>Vị trí</th>
                    <th>Phiếu SD</th>
                    <th class="admin-only">Xóa</th>
                </tr>
            </thead>
            <tbody id="mainTable"></tbody>
        </table>
    </div>
</div>

<!-- VÙNG IN BÁO CÁO SOP -->
<div id="printArea">
    <div class="sop-header">
        <div>TRUNG TÂM BĐKT - ĐỘI THÔNG TIN</div>
        <div>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div>
    </div>
    <h2 style="text-align:center; text-transform: uppercase;">Danh mục thiết bị kỹ thuật</h2>
    <table border="1" style="width:100%; border-collapse:collapse; margin-top:20px;">
        <thead>
            <tr><th>STT</th><th>Tên thiết bị</th><th>Mã CCDC</th><th>Mã Kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th></tr>
        </thead>
        <tbody id="printTableBody"></tbody>
    </table>
</div>

<!-- VÙNG IN PHIẾU BÁO SD RIÊNG LẺ -->
<div id="singleRepairArea"></div>

<script>
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbywWF4ZrtOxZJw_dIhixcnkJ-fIR6qvugRbbORvbeTLD73w8EiE4WyAqILrWVI-4z-_/exec";
    let inventory = JSON.parse(localStorage.getItem('atcc_inventory_sop_final')) || [];
    let currentUser = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if (u === 'admin' && p === 'admin') currentUser = 'admin';
        else if (u === 'guest' && p === '123456') currentUser = 'guest';
        else return alert("Sai tài khoản!");
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        render();
    }

    async function addItem() {
        const name = document.getElementById('inName').value.trim();
        if(!name) return alert("Nhập tên thiết bị!");
        const newItem = {
            name, code: document.getElementById('inCode').value || "-",
            warehouse: document.getElementById('inWarehouse').value || "-",
            pn: document.getElementById('inPN').value || "-",
            sn: document.getElementById('inSN').value || "-",
            loc: document.getElementById('inLoc').value || "-"
        };
        try {
            await fetch(URL_APPS_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newItem) });
            inventory.push(newItem); localStorage.setItem('atcc_inventory_sop_final', JSON.stringify(inventory));
            render(); alert("Đã lưu!");
        } catch (e) { alert("Lỗi ghi dữ liệu!"); }
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        const search = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = ''; pBody.innerHTML = '';
        
        inventory.filter(i => i.name.toLowerCase().includes(search)).forEach((item, idx) => {
            tbody.innerHTML += `<tr>
                <td>${idx+1}</td>
                <td><b>${item.name}</b></td>
                <td>${item.code}</td>
                <td>${item.warehouse}</td>
                <td>${item.pn}</td>
                <td>${item.sn}</td>
                <td>${item.loc}</td>
                <td><button class="btn-row-repair" onclick="printSingleRepair(${idx})">📄 In Phiếu</button></td>
                <td class="admin-only"><button style="background:red;color:white;border:none;padding:5px;border-radius:4px;" onclick="deleteItem(${idx})">Xóa</button></td>
            </tr>`;
            pBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;
        });
        if (currentUser === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'table-cell');
    }

    function printSingleRepair(idx) {
        const item = inventory[idx];
        const date = new Date();
        const area = document.getElementById('singleRepairArea');
        area.innerHTML = `
            <div class="repair-paper">
                <div class="sop-header">
                    <div>TỔNG CÔNG TY QUẢN LÝ BAY VN<br>TRUNG TÂM BĐKT - ĐỘI THÔNG TIN</div>
                    <div>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM<br>Độc lập - Tự do - Hạnh phúc</div>
                </div>
                <div class="repair-title-box">
                    <h2>PHIẾU BÁO SỬ DỤNG - SỬA CHỮA THIẾT BỊ</h2>
                    <p><i>Ngày ${date.getDate()} tháng ${date.getMonth()+1} năm ${date.getFullYear()}</i></p>
                </div>
                <div class="repair-content">
                    <div class="info-row"><b>1. Tên thiết bị / Model:</b> <span class="dotted-line">${item.name}</span></div>
                    <div class="info-row"><b>2. Mã CCDC / Mã kho:</b> <span class="dotted-line">${item.code} / ${item.warehouse}</span></div>
                    <div class="info-row"><b>3. Part Number (P/N):</b> <span class="dotted-line">${item.pn}</span></div>
                    <div class="info-row"><b>4. Serial Number (S/N):</b> <span class="dotted-line">${item.sn}</span></div>
                    <div class="info-row"><b>5. Vị trí lắp đặt:</b> <span class="dotted-line">${item.loc}</span></div>
                    <div class="info-row"><b>6. Nội dung yêu cầu:</b> <span class="dotted-line"></span></div>
                    <div class="info-row"><span class="dotted-line" style="margin-left:0; height:30px;"></span></div>
                    <div class="info-row"><b>7. Tình trạng sau xử lý:</b> <span class="dotted-line"></span></div>
                </div>
                <div class="repair-footer">
                    <div><b>NGƯỜI BÁO CÁO</b><br><br><div class="footer-sign"></div><b>${currentUser === 'admin' ? 'Trần Văn Trường' : 'Cán bộ trực'}</b></div>
                    <div><b>XÁC NHẬN CỦA ĐƠN VỊ</b><br><br><div class="footer-sign"></div>..........................................</div>
                </div>
            </div>`;
        document.body.className = "printing-repair";
        window.print();
    }

    function deleteItem(idx) { if(confirm("Xóa?")) { inventory.splice(idx,1); localStorage.setItem('atcc_inventory_sop_final', JSON.stringify(inventory)); render(); } }
    function printReport() { document.body.className = "printing-report"; window.print(); }
    async function syncFromCloud() {
        const res = await fetch(URL_APPS_SCRIPT);
        inventory = await res.json();
        localStorage.setItem('atcc_inventory_sop_final', JSON.stringify(inventory));
        render();
    }
</script>
</body>
</html>
