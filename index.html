<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - TRẦN VĂN TRƯỜNG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1e40af; --bg: #f8fafc; --txt: #0f172a; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        
        .no-print { max-width: 1250px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 4px; outline: none; }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; transition: 0.2s; }
        .btn-add { background: var(--p); }
        .btn-sync { background: #0891b2; }
        .btn-excel { background: #16a34a; }
        .btn-label { background: #ca8a04; }
        .btn-print { background: #0f172a; }
        .btn-logout { background: #64748b; margin-top: 10px; width: 100%; }
        .btn-del { background: var(--danger); padding: 6px 12px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 8px; overflow: hidden; }
        thead { background: #f1f5f9; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { font-size: 11px; text-transform: uppercase; color: #64748b; }
        
        .admin-only { display: none; }
        .editable { cursor: pointer; color: var(--p); text-decoration: underline dotted; }
        .qr-container { background: #fff; padding: 2px; border: 1px solid #eee; display: inline-block; }

        @media (max-width: 768px) {
            thead { display: none; }
            tbody tr { display: block; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; border-radius: 10px; }
            tbody td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
            tbody td::before { content: attr(data-label); font-weight: bold; font-size: 11px; color: #64748b; }
        }

        /* --- CẤU HÌNH IN --- */
        #printArea, #labelArea { display: none; }
        @media print {
            .no-print, #loginOverlay { display: none !important; }
            body { background: white; padding: 0; }
            
            /* In Báo Cáo */
            body.printing-report #printArea { display: block !important; padding: 10mm; }
            #printTable { width: 100%; border-collapse: collapse; border: 1px solid black; }
            #printTable th, #printTable td { border: 1px solid black; padding: 5px; font-size: 10pt; text-align: center; }

            /* In Nhãn dán chuyên nghiệp */
            body.printing-labels #labelArea { 
                display: grid !important; 
                grid-template-columns: repeat(3, 60mm); 
                gap: 5mm; 
                padding: 10mm; 
                justify-content: center;
            }
            .label-box { 
                width: 60mm; 
                height: 35mm; 
                border: 1pt solid #000; 
                padding: 3mm; 
                display: flex; 
                align-items: center; 
                justify-content: space-between;
                page-break-inside: avoid;
            }
            .label-text { font-size: 8pt; line-height: 1.4; font-weight: bold; text-transform: uppercase; flex: 1; }
            .label-qr-wrap { width: 22mm; height: 22mm; margin-left: 2mm; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3 style="margin-bottom: 20px; color: var(--p);">HỆ THỐNG QUẢN LÝ CNS/ATM</h3>
        <input type="text" id="user" placeholder="Tên đăng nhập">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button class="btn-add" style="width: 100%; margin-top: 15px;" onclick="checkLogin()">Đăng nhập</button>
    </div>
</div>

<div class="no-print" id="mainApp">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: var(--p);">QUẢN LÝ THIẾT BỊ KỸ THUẬT</h2>
        <p style="font-size: 13px; color: #64748b;">Đội Thông tin - Trung tâm BĐKT | Cán bộ: <b id="displayUser"></b></p>
    </div>

    <div class="card admin-only" id="inputCard">
        <div class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div><label>Tên thiết bị / Model</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div><label>Vị trí lắp đặt</label><input type="text" id="inLoc"></div>
        </div>
        <div class="actions">
            <button class="btn-add" onclick="addItem()">➕ Thêm thiết bị mới</button>
        </div>
    </div>

    <div class="card">
        <div class="actions" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));">
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Xuất Excel</button>
            <button class="btn-label" onclick="printLabels()">🏷️ In Nhãn dán</button>
            <button class="btn-print" onclick="printReport()">📄 In Báo Cáo SOP</button>
            <button class="btn-logout" onclick="location.reload()">🔒 Đăng xuất</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm nhanh thiết bị, S/N, vị trí..." style="width:100%; padding:14px; border-radius:10px; border:1px solid #cbd5e1; margin-bottom: 15px;">

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Thiết bị</th>
                <th>Mã CCDC</th>
                <th>S/N</th>
                <th>Vị trí</th>
                <th>QR</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<div id="printArea">
    <h2 style="text-align:center">BẢNG THỐNG KÊ THIẾT BỊ KỸ THUẬT</h2>
    <p id="printDate" style="text-align:center"></p>
    <table id="printTable">
        <thead>
            <tr>
                <th>STT</th><th>Thiết bị</th><th>Mã CCDC</th><th>Mã kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th>
            </tr>
        </thead>
        <tbody id="printTableBody"></tbody>
    </table>
</div>

<div id="labelArea"></div>

<script>
    // URL CỐ ĐỊNH CỦA ANH
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbyNJomMQDvRitKGut0ky1zIARO1hvlJX2Ygwz4iL6XHaFs6d3mipD0ujrdjlswnBc-d/exec";
    const STORAGE_KEY = 'atcc_inventory_sop_final';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentUser = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if (u === 'admin' && p === 'admin') currentUser = 'admin';
        else if (u === 'guest' && p === '123456') currentUser = 'guest';
        else return alert("Sai thông tin!");

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('displayUser').innerText = (u === 'admin' ? "Trần Văn Trường" : "Cán bộ trực");
        if (currentUser === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        render();
    }

    function addItem() {
        const name = document.getElementById('inName').value.trim();
        if(!name) return alert("Vui lòng nhập tên!");
        inventory.push({
            id: Date.now(),
            name: name,
            code: document.getElementById('inCode').value.trim() || "-",
            warehouse: document.getElementById('inWarehouse').value.trim() || "-",
            pn: document.getElementById('inPN').value.trim() || "-",
            sn: document.getElementById('inSN').value.trim() || "-",
            loc: document.getElementById('inLoc').value.trim() || "-"
        });
        saveData();
        ['inName','inCode','inWarehouse','inPN','inSN','inLoc'].forEach(id => document.getElementById(id).value = '');
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        const lArea = document.getElementById('labelArea');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        tbody.innerHTML = ''; pBody.innerHTML = ''; lArea.innerHTML = '';
        const filtered = inventory.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(search)));

        filtered.forEach((item, idx) => {
            const qrT = `qt-${item.id}`; const qrL = `ql-${item.id}`;

            // Bảng hiển thị
            tbody.innerHTML += `<tr>
                <td data-label="STT">${idx+1}</td>
                <td data-label="Thiết bị"><b>${item.name}</b></td>
                <td data-label="Mã CCDC">${item.code}</td>
                <td data-label="S/N">${item.sn}</td>
                <td data-label="Vị trí">${item.loc}</td>
                <td data-label="QR Code"><div id="${qrT}" class="qr-container"></div></td>
                <td data-label="Thao tác"><button class="btn-del" onclick="deleteItem(${item.id})">Xóa</button></td>
            </tr>`;

            // Báo cáo
            pBody.innerHTML += `<tr>
                <td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td>
            </tr>`;

            // Nhãn in
            lArea.innerHTML += `<div class="label-box">
                <div class="label-text">${item.name}<br>CCDC: ${item.code}<br>S/N: ${item.sn}<br>VT: ${item.loc}</div>
                <div id="${qrL}" class="label-qr-wrap"></div>
            </div>`;

            setTimeout(() => {
                const txt = `TB: ${item.name} | SN: ${item.sn}`;
                new QRCode(document.getElementById(qrT), { text: txt, width: 50, height: 50 });
                new QRCode(document.getElementById(qrL), { text: txt, width: 80, height: 80 });
            }, 50);
        });
    }

    function deleteItem(id) {
        if(confirm("Xóa hàng này?")) {
            inventory = inventory.filter(i => i.id !== id);
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
    }

    async function syncFromCloud() {
        try {
            const res = await fetch(URL_APPS_SCRIPT);
            const data = await res.json();
            if(data) { inventory = data; saveData(); alert("Đã đồng bộ từ Google Sheets!"); }
        } catch(e) { alert("Lỗi kết nối Cloud!"); }
    }

    function printReport() {
        document.getElementById('printDate').innerText = `Ngày in: ${new Date().toLocaleDateString('vi-VN')}`;
        document.body.className = "printing-report";
        window.print();
    }

    function printLabels() {
        document.body.className = "printing-labels";
        window.print();
    }

    function exportCSV() {
        let csv = "\ufeffSTT,Thiet Bi,Ma CCDC,S/N,Vi Tri\n";
        inventory.forEach((i, idx) => csv += `${idx+1},${i.name},${i.code},${i.sn},${i.loc}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `Vat_Tu_CNS.csv`; link.click();
    }
</script>
</body>
</html>
