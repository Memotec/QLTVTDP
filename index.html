<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM</title>
    <!-- Tải thư viện QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        .no-print { max-width: 1300px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; margin-top: 4px; outline: none; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; }
        .btn-add { grid-column: span 2; background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-excel { background: #10b981; }
        .btn-print { background: #0f172a; grid-column: span 2; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        thead { display: none; }
        tbody tr { display: block; background: white; border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; margin-bottom: 8px; }
        tbody td { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; align-items: center; }
        tbody td:last-child { border: none; }
        tbody td::before { content: attr(data-label); font-weight: 700; color: #94a3b8; font-size: 11px; }

        .qr-box { background: #fff; padding: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .qr-box img { display: block; margin: 0 auto; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .full { grid-column: span 2; }
            thead { display: table-header-group; text-align: center; }
            tbody tr { display: table-row; }
            tbody td { display: table-cell; border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: center; vertical-align: middle; }
            tbody td::before { display: none; }
            .actions { grid-template-columns: repeat(4, 1fr); }
            .btn-add, .btn-print { grid-column: auto; }
        }

        #printArea { display: none; }
        @media print {
            .no-print { display: none !important; }
            #printArea { display: block !important; }
            #printTable { width: 100%; border-collapse: collapse; margin-top: 15px; }
            #printTable th, #printTable td { border: 1px solid #000; padding: 5px; font-size: 11px; text-align: center; }
            .print-header { text-align: center; margin-bottom: 20px; }
            .sig-section { display: flex; justify-content: space-between; margin-top: 30px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="color: var(--p);">HỆ THỐNG QUẢN LÝ THIẾT BỊ CNS</h2>
        <div style="font-size: 12px; background: #fff; padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd;">
            KTV: <b>Trần Văn Trường</b>
        </div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="full"><label>Tên thiết bị / Model</label><input type="text" id="inName" placeholder="Tên TB..."></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode" placeholder="..."></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse" placeholder="..."></div>
            <div><label>P/N</label><input type="text" id="inPN" placeholder="..."></div>
            <div><label>S/N</label><input type="text" id="inSN" placeholder="..."></div>
            <div class="full"><label>Vị trí lắp đặt</label><input type="text" id="inLoc" placeholder="..."></div>
        </div>
        <div class="actions">
            <button class="btn-add" onclick="addItem()">➕ Thêm mới</button>
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Xuất Excel</button>
            <button class="btn-print" onclick="window.print()">📄 In Báo Cáo</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm nhanh..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #cbd5e1; margin-bottom: 10px;">

    <table>
        <thead>
            <tr>
                <th style="width: 40px;">STT</th>
                <th>Thiết bị</th>
                <th>Mã CCDC</th>
                <th>Mã Kho</th>
                <th>P/N</th>
                <th>S/N</th>
                <th>Vị trí</th>
                <th style="width: 90px;">Mã QR</th>
                <th style="width: 50px;">Xóa</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<div id="printArea">
    <div class="print-header">
        <p>TRUNG TÂM BẢO ĐẢM KỸ THUẬT - ĐỘI THÔNG TIN</p>
        <br>
        <h2>BÁO CÁO THỐNG KÊ THIẾT BỊ HÀNG KHÔNG</h2>
        <p id="printDate"></p>
    </div>
    <table id="printTable">
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên thiết bị / Model</th>
                <th>Mã CCDC</th>
                <th>Mã Kho</th>
                <th>P/N</th>
                <th>S/N</th>
                <th>Vị trí</th>
            </tr>
        </thead>
        <tbody id="printTableBody"></tbody>
    </table>
    <div class="sig-section">
        <div style="text-align: center; width: 40%;"><b>XÁC NHẬN ĐƠN VỊ</b></div>
        <div style="text-align: center; width: 40%;"><b>NGƯỜI LẬP BIỂU</b><br><br><br><br><b>TRẦN VĂN TRƯỜNG</b></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'atcc_cns_system_final';
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwtDwOUKSSBcRuHvu573-5ofTxKwt7nTXwQW0JY0ehZ7xv_EYWEpJCJiJgSItSHNYEp/exec"; 
    const PASS_KEY = "123456";

    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    async function saveAll() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return;
        fetch(URL_APPS_SCRIPT, { method: "POST", mode: "no-cors", body: JSON.stringify(inventory) });
    }

    function addItem() {
        const name = document.getElementById('inName').value;
        const code = document.getElementById('inCode').value;
        const warehouse = document.getElementById('inWarehouse').value;
        const pn = document.getElementById('inPN').value;
        const sn = document.getElementById('inSN').value;
        const loc = document.getElementById('inLoc').value;
        
        if(!name || !code) return alert("Cần nhập Tên và Mã CCDC!");
        inventory.push({ id: Date.now(), name, code, warehouse, pn, sn, loc });
        saveAll();
        document.getElementById('inCode').value = ''; 
        document.getElementById('inSN').value = '';
    }

    async function syncFromCloud() {
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return alert("Chưa nhập URL!");
        try {
            const res = await fetch(URL_APPS_SCRIPT);
            const data = await res.json();
            inventory = data.map(d => ({...d, id: d.id || Date.now()+Math.random()}));
            saveAll();
            alert("Đồng bộ thành công!");
        } catch(e) { alert("Lỗi tải dữ liệu!"); }
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        const q = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = ''; pBody.innerHTML = '';
        
        const filtered = inventory.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(q)));

        filtered.forEach((item, idx) => {
            const qrId = `qr-${item.id}`;
            // Bảng Web
            tbody.innerHTML += `
                <tr>
                    <td data-label="STT">${idx+1}</td>
                    <td data-label="Thiết bị"><b>${item.name}</b></td>
                    <td data-label="CCDC">${item.code}</td>
                    <td data-label="Kho">${item.warehouse || '-'}</td>
                    <td data-label="P/N">${item.pn || '-'}</td>
                    <td data-label="S/N">${item.sn || '-'}</td>
                    <td data-label="Vị trí">${item.loc || '-'}</td>
                    <td data-label="QR"><div id="${qrId}" class="qr-box"></div></td>
                    <td data-label="Xóa"><span style="cursor:pointer; color:red" onclick="deleteItem(${item.id})">🗑️</span></td>
                </tr>`;
            
            // Bảng In
            pBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;

            // Vẽ QR (Tối ưu hóa thời gian chờ)
            setTimeout(() => {
                const el = document.getElementById(qrId);
                if(el && typeof QRCode !== 'undefined') {
                    el.innerHTML = "";
                    const content = `CCDC:${item.code}\nKHO:${item.warehouse}\nPN:${item.pn}\nSN:${item.sn}`;
                    new QRCode(el, {
                        text: content,
                        width: 75,
                        height: 75,
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            }, 200);
        });
        document.getElementById('printDate').innerText = "TP. Hồ Chí Minh, " + new Date().toLocaleDateString('vi-VN');
    }

    function deleteItem(id) {
        if(!confirm("Xác nhận xóa hàng này?")) return;
        if(prompt("Mật khẩu xóa:") !== PASS_KEY) return alert("Sai!");
        inventory = inventory.filter(i => i.id !== id);
        saveAll();
    }

    function exportCSV() {
        let csv = "\ufeffSTT,Thiet bi,Ma CCDC,Ma Kho,PN,SN,Vi tri\n";
        inventory.forEach((i, idx) => csv += `${idx+1},${i.name},${i.code},${i.warehouse},${i.pn},${i.sn},${i.loc}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        link.download = "Thong_Ke_CNS.csv"; link.click();
    }

    render();
</script>
</body>
</html>
