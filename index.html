<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUẢN LÝ THIẾT BỊ ATCCHCM</title>
    <style>
        :root {
            --primary: #4338ca;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --danger: #ef4444;
            --edit: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        
        /* Header */
        .header-top { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; text-align: center; }
        .contact-box { background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 13px; }

        /* Form Nhập liệu */
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group:nth-child(1) { grid-column: span 2; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 4px; }

        /* Nút bấm */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 14px; }
        .btn-add { grid-column: span 2; background: var(--primary); }
        .btn-excel { background: #10b981; }
        .btn-print { background: #0f172a; }

        /* Giao diện Bảng/Card Mobile */
        .table-wrapper { margin-top: 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        thead { display: none; } /* Ẩn tiêu đề trên mobile */
        
        tbody tr { display: block; background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 12px; position: relative; }
        tbody td { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tbody td:last-child { border: none; }
        tbody td::before { content: attr(data-label); font-weight: 700; color: #64748b; font-size: 12px; }
        
        /* Hiệu ứng chỉnh sửa */
        .editable { color: var(--primary); font-weight: 600; text-decoration: underline dotted; cursor: pointer; }
        .delete-icon { color: var(--danger); font-weight: bold; font-size: 18px; }

        /* Desktop */
        @media (min-width: 768px) {
            .header-top { flex-direction: row; justify-content: space-between; text-align: left; }
            .form-grid { grid-template-columns: repeat(4, 1fr); }
            .form-group:nth-child(1) { grid-column: auto; }
            thead { display: table-header-group; }
            thead th { text-align: left; padding: 12px; color: #64748b; font-size: 12px; }
            tbody tr { display: table-row; }
            tbody td { display: table-cell; padding: 12px; border-bottom: 1px solid #e2e8f0; }
            tbody td::before { display: none; }
            .actions { display: flex; width: auto; }
            .btn-add { width: 150px; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header-top">
        <h2 style="font-size: 18px;">THỐNG KÊ ĐIỆN THOẠI ATCCHCM</h2>
        <div class="contact-box">Phụ trách: <b>Trần Văn Trường</b></div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="form-group"><label>Thiết bị</label><input type="text" id="inName" value="PANASONIC KX-TS500"></div>
            <div class="form-group"><label>Mã CCDC</label><input type="text" id="inCode" placeholder="Nhập mã..."></div>
            <div class="form-group"><label>Số S/N</label><input type="text" id="inSN" placeholder="..."></div>
            <div class="form-group"><label>Vị trí</label><input type="text" id="inLoc" placeholder="..."></div>
        </div>
        <div class="actions">
            <button class="btn-add" onclick="addItem()">+ THÊM MỚI</button>
            <button class="btn-excel" onclick="exportCSV()">📁 XUẤT EXCEL</button>
            <button class="btn-print" onclick="window.print()">📄 IN BẢNG</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm nhanh..." style="margin-bottom: 15px;">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Thiết bị</th>
                    <th>Mã CCDC</th>
                    <th>S/N</th>
                    <th>Vị trí</th>
                    <th>Xóa</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // KHÓA LƯU TRỮ CỐ ĐỊNH - KHÔNG THAY ĐỔI
    const STORAGE_KEY = 'ATCC_MASTER_STORAGE';
    const PASS_KEY = "123456";

    // 1. Lấy dữ liệu từ bộ nhớ
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // 2. Lưu dữ liệu
    function saveAndRender() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
    }

    // 3. Thêm mới
    function addItem() {
        const name = document.getElementById('inName').value;
        const code = document.getElementById('inCode').value;
        const sn = document.getElementById('inSN').value;
        const loc = document.getElementById('inLoc').value;

        if(!name || !code) return alert("Vui lòng nhập Tên và Mã!");

        inventory.push({ id: Date.now(), name, code, sn, loc });
        saveAndRender();
        
        // Reset ô nhập mã
        document.getElementById('inCode').value = '';
        document.getElementById('inSN').value = '';
    }

    // 4. CHỈNH SỬA TRỰC TIẾP
    function editField(id, field) {
        const item = inventory.find(i => i.id === id);
        const newValue = prompt(`Cập nhật ${field.toUpperCase()}:`, item[field]);
        
        if (newValue !== null) {
            item[field] = newValue;
            saveAndRender();
        }
    }

    // 5. Xóa
    function deleteItem(id) {
        if(confirm("Xóa thiết bị này?")) {
            const pw = prompt("Nhập mật khẩu để xóa:");
            if(pw === PASS_KEY) {
                inventory = inventory.filter(i => i.id !== id);
                saveAndRender();
            } else {
                alert("Sai mật khẩu!");
            }
        }
    }

    // 6. Hiển thị
    function render() {
        const tbody = document.getElementById('tableBody');
        const query = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';

        const filtered = inventory.filter(item => 
            item.name.toLowerCase().includes(query) || 
            item.code.toLowerCase().includes(query) ||
            item.sn.toLowerCase().includes(query) ||
            item.loc.toLowerCase().includes(query)
        );

        filtered.forEach((item, idx) => {
            tbody.innerHTML += `
                <tr>
                    <td data-label="STT">${idx + 1}</td>
                    <td data-label="Thiết bị" class="editable" onclick="editField(${item.id}, 'name')"><b>${item.name}</b></td>
                    <td data-label="Mã CCDC" class="editable" onclick="editField(${item.id}, 'code')">${item.code}</td>
                    <td data-label="Số S/N" class="editable" onclick="editField(${item.id}, 'sn')">${item.sn || '...'}</td>
                    <td data-label="Vị trí" class="editable" onclick="editField(${item.id}, 'loc')">${item.loc || '...'}</td>
                    <td data-label="Thao tác" style="text-align: right;">
                        <span class="delete-icon" onclick="deleteItem(${item.id})">🗑️</span>
                    </td>
                </tr>
            `;
        });
    }

    // 7. Xuất Excel (CSV)
    function exportCSV() {
        let csv = "\ufeffSTT,Ten Thiet Bi,Ma CCDC,Serial,Vi Tri\n";
        inventory.forEach((item, idx) => {
            csv += `${idx+1},${item.name},${item.code},${item.sn},${item.loc}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `ThongKe_ATCC_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    render();
</script>

</body>
</html>
