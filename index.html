<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - ĐỘI THÔNG TIN</title>
    
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --word: #2b579a; --edit: #0ea5e9; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        
        /* Login */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }

        .container { max-width: 1400px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e2e8f0; }
        
        /* Search & Form */
        input#searchInput { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--p); margin-bottom: 15px; font-size: 16px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .full { grid-column: 1 / -1; }
        label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .form-grid input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 4px; }

        /* Buttons */
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        button { padding: 10px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        /* Table */
        .table-wrap { overflow-x: auto; background: white; border-radius: 10px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8fafc; padding: 12px; font-size: 12px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 14px; }

        /* Print Settings */
        #printLabelArea, #printQrOnlyArea { display: none; }
        @media print {
            .no-print { display: none !important; }
            body.printing-labels #printLabelArea { display: grid !important; grid-template-columns: repeat(3, 62mm); gap: 2mm; padding: 5mm; }
            body.printing-qrs #printQrOnlyArea { display: grid !important; grid-template-columns: repeat(6, 30mm); gap: 5mm; padding: 10mm; }
            .label-item { width: 62mm; height: 35mm; border: 0.5pt solid #000; padding: 2mm; display: flex; flex-direction: column; page-break-inside: avoid; }
            .qr-only-item { width: 30mm; text-align: center; border: 0.5pt dashed #ccc; padding: 2mm; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color: var(--p); margin-bottom: 20px;">CNS/ATM MANAGEMENT</h2>
        <input type="text" id="user" placeholder="Tài khoản">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="checkLogin()" style="background:var(--p); width:100%; padding:14px;">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="container no-print" id="mainApp">
    <!-- Form Admin -->
    <div class="card" id="adminArea" style="display:none;">
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            <div class="full"><label>Tên thiết bị</label><input type="text" id="inName"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>SL</label><input type="number" id="inQty" value="1"></div>
            <div class="full"><label>Vị trí</label><input type="text" id="inLoc"></div>
        </div>
        <div class="btn-group">
            <button id="btnAdd" style="background:var(--p); flex:2" onclick="addItem()">➕ Thêm mới</button>
            <button id="btnUpdate" style="background:var(--edit); flex:2; display:none;" onclick="updateItem()">💾 Lưu thay đổi</button>
            <button style="background:#94a3b8" onclick="clearForm()">Làm mới</button>
        </div>
    </div>

    <!-- Công cụ -->
    <div class="card">
        <input type="text" id="searchInput" oninput="render()" placeholder="🔍 Tìm nhanh Tên, S/N hoặc P/N...">
        <div class="btn-group">
            <button style="background:#22c55e" onclick="syncCloud()">🔄 Đồng bộ Cloud</button>
            <button style="background:var(--word)" onclick="exportToWord()">📝 Xuất File Word</button>
            <button style="background:#f59e0b" onclick="doPrint('labels')">🏷️ IN NHÃN DÁN</button>
            <button style="background:#10b981" onclick="doPrint('qrs')">📱 IN MÃ QR CODE</button>
            <button style="background:#64748b" onclick="location.reload()">🔒 Thoát</button>
        </div>
    </div>

    <!-- Bảng dữ liệu -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>STT</th><th style="text-align:left">Tên thiết bị</th>
                    <th>P/N</th><th>S/N</th><th>Mã CCDC</th><th>SL</th><th>Vị trí</th><th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<div id="printLabelArea"></div>
<div id="printQrOnlyArea"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOhq-bmhvxGeFz1oCaXoiJRJTpTtckexhNxSTNT4BmcuxtfEUENqHZrPNpxTD_xuXJ/exec";
    let inventory = JSON.parse(localStorage.getItem('cns_data_v26')) || [];
    let role = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if ((u === 'admin' && p === 'admin') || (u === 'guest' && p === '123456')) {
            role = u;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            if(role === 'admin') document.getElementById('adminArea').style.display = 'block';
            render();
        } else alert("Sai thông tin!");
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const lblArea = document.getElementById('printLabelArea');
        const qrArea = document.getElementById('printQrOnlyArea');
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        
        tbody.innerHTML = ''; lblArea.innerHTML = ''; qrArea.innerHTML = '';

        inventory.forEach((item, idx) => {
            const match = item.name.toLowerCase().includes(q) || item.sn.toLowerCase().includes(q) || item.pn.toLowerCase().includes(q);
            if (q === "" || match) {
                // Table
                tbody.innerHTML += `<tr>
                    <td>${idx+1}</td>
                    <td style="text-align:left"><b>${item.name}</b></td>
                    <td>${item.pn}</td><td>${item.sn}</td><td>${item.code}</td>
                    <td>${item.qty}</td><td>${item.loc}</td>
                    <td><button style="background:var(--edit)" onclick="editItem(${idx})">Chọn</button></td>
                </tr>`;

                // Nhãn (Label)
                const lid = `l-${idx}`;
                lblArea.innerHTML += `
                    <div class="label-item">
                        <div style="font-size:7pt; font-weight:bold; text-align:center; border-bottom:0.5pt solid #000">ĐỘI THÔNG TIN - TT BĐKT</div>
                        <div style="display:flex; align-items:center; flex:1">
                            <div style="flex:2; font-size:7pt; line-height:1.3">
                                <b>${item.name.substring(0,30)}</b><br>PN: ${item.pn}<br>SN: ${item.sn}<br>CCDC: ${item.code}
                            </div>
                            <div style="flex:1" id="${lid}"></div>
                        </div>
                    </div>`;

                // QR riêng lẻ
                const qid = `q-${idx}`;
                qrArea.innerHTML += `
                    <div class="qr-only-item">
                        <div id="${qid}"></div>
                        <div style="font-size:7pt; font-weight:bold; margin-top:2px;">SN: ${item.sn}</div>
                    </div>`;

                setTimeout(() => {
                    if(document.getElementById(lid)) document.getElementById(lid).appendChild(kjua({render:'image', size:120, text:item.sn}));
                    if(document.getElementById(qid)) document.getElementById(qid).appendChild(kjua({render:'image', size:100, text:item.sn}));
                }, 50);
            }
        });
    }

    // CRUD & Sync
    function addItem() {
        inventory.push({
            name: document.getElementById('inName').value, pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value, code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value, qty: document.getElementById('inQty').value,
            loc: document.getElementById('inLoc').value
        });
        save(); clearForm();
    }

    function editItem(idx) {
        if(role !== 'admin') return alert("Chỉ Admin mới có quyền sửa!");
        const item = inventory[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = item.name;
        document.getElementById('inSN').value = item.sn;
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        window.scrollTo(0,0);
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx] = {
            name: document.getElementById('inName').value, pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value, code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value, qty: document.getElementById('inQty').value,
            loc: document.getElementById('inLoc').value
        };
        save(); clearForm();
    }

    async function save() {
        localStorage.setItem('cns_data_v26', JSON.stringify(inventory));
        render();
        if(WEB_APP_URL && role === 'admin') {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(inventory) });
        }
    }

    function clearForm() { document.querySelectorAll('.form-grid input').forEach(i => i.value = i.id==='inQty'?'1':''); document.getElementById('btnAdd').style.display='block'; document.getElementById('btnUpdate').style.display='none'; }

    async function syncCloud() {
        try {
            const r = await fetch(WEB_APP_URL);
            inventory = await r.json();
            save(); alert("Đã đồng bộ!");
        } catch(e) { alert("Lỗi kết nối Cloud!"); }
    }

    function doPrint(type) {
        document.body.className = type === 'labels' ? 'printing-labels' : 'printing-qrs';
        window.print();
    }

    function exportToWord() {
        const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType, AlignmentType, TextRun } = docx;
        const rows = [new TableRow({ children: ["STT", "Thiết bị", "P/N", "S/N", "Mã CCDC", "Vị trí"].map(t => new TableCell({ children: [new Paragraph({ children: [new TextRun({text:t, bold:true})], alignment: AlignmentType.CENTER })], background:{fill:"E2E8F0"} })) })];
        inventory.forEach((item, i) => {
            rows.push(new TableRow({ children: [(i+1).toString(), item.name, item.pn, item.sn, item.code, item.loc].map(t => new TableCell({ children: [new Paragraph({text: t || ""})] })) }));
        });
        const doc = new Document({ sections: [{ children: [ new Paragraph({ children: [new TextRun({text:"DANH MỤC THIẾT BỊ CNS/ATM", bold:true, size:28})], alignment: AlignmentType.CENTER }), new Paragraph({text:"", break:1}), new Table({ width: {size:100, type:WidthType.PERCENTAGE}, rows }) ] }] });
        Packer.toBlob(doc).then(blob => saveAs(blob, "Danh_muc_CNS.docx"));
    }
</script>
</body>
</html>
