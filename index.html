<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--txt); padding: 15px; }
        .no-print { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 5px; outline: none; }
        .actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; color: white; transition: 0.2s; }
        .btn-add { grid-column: span 2; background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-print { background: #0f172a; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        thead { background: #e2e8f0; }
        th, td { padding: 12px; text-align: center; font-size: 14px; }
        tbody tr { background: white; border-radius: 10px; }
        .qr-box { background: white; padding: 5px; display: inline-block; border: 1px solid #eee; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .actions { grid-template-columns: repeat(4, 1fr); }
            .btn-add { grid-column: auto; }
        }
        
        #printArea { display: none; }
        @media print {
            .no-print { display: none; }
            #printArea { display: block; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid black; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2>HỆ THỐNG QUẢN LÝ THIẾT BỊ - TRẦN VĂN TRƯỜNG</h2>
    <div class="card">
        <div class="form-grid">
            <div class="full"><label>Tên thiết bị</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí</label><input type="text" id="inLoc"></div>
        </div>
        <div class="actions">
            <button class="btn-add" onclick="addItem()">➕ Thêm mới</button>
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button class="btn-print" onclick="window.print()">📄 In Báo Cáo</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Thiết bị</th>
                <th>Mã CCDC</th>
                <th>Mã Kho</th>
                <th>P/N</th>
                <th>S/N</th>
                <th>Vị trí</th>
                <th>Mã QR</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<div id="printArea">
    <h2 style="text-align:center">DANH MỤC THIẾT BỊ CNS/ATM</h2>
    <table id="printTable">
        <thead>
            <tr>
                <th>STT</th>
                <th>Thiết bị</th>
                <th>Mã CCDC</th>
                <th>Mã Kho</th>
                <th>P/N</th>
                <th>S/N</th>
                <th>Vị trí</th>
            </tr>
        </thead>
        <tbody id="printTableBody"></tbody>
    </table>
</div>

<script>
    const STORAGE_KEY = 'vcs_cns_v5';
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxTpbkFbdQvTv7FYLmpx7c13PWNoVktHi4IguCLmcAxI9hnT9mlM5hYg_3ilQClu3O7/exec"; 
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    function saveAll() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
        if (!URL_APPS_SCRIPT.includes("DÁN_URL")) {
            fetch(URL_APPS_SCRIPT, { method: "POST", mode: "no-cors", body: JSON.stringify(inventory) });
        }
    }

    function addItem() {
        const item = {
            id: Date.now(),
            name: document.getElementById('inName').value,
            code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value,
            pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value,
            loc: document.getElementById('inLoc').value
        };
        if(!item.name || !item.code) return alert("Nhập Tên và Mã CCDC!");
        inventory.push(item);
        saveAll();
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        tbody.innerHTML = ''; pBody.innerHTML = '';

        inventory.forEach((item, idx) => {
            const qrId = `qr-${item.id}`;
            tbody.innerHTML += `
                <tr>
                    <td>${idx+1}</td>
                    <td><b>${item.name}</b></td>
                    <td>${item.code}</td>
                    <td>${item.warehouse}</td>
                    <td>${item.pn}</td>
                    <td>${item.sn}</td>
                    <td>${item.loc}</td>
                    <td><div id="${qrId}" class="qr-box"></div></td>
                </tr>`;
            
            pBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;

            setTimeout(() => {
                const el = document.getElementById(qrId);
                if(el) {
                    el.innerHTML = "";
                    // NỘI DUNG QR ĐƯỢC TỐI ƯU HIỂN THỊ CHI TIẾT
                    const content = 
                        `THIẾT BỊ: ${item.name}\n` +
                        `MÃ CCDC: ${item.code}\n` +
                        `MÃ KHO: ${item.warehouse || 'N/A'}\n` +
                        `P/N: ${item.pn || 'N/A'}\n` +
                        `S/N: ${item.sn || 'N/A'}\n` +
                        `VỊ TRÍ: ${item.loc || 'N/A'}`;

                    new QRCode(el, {
                        text: content,
                        width: 90,
                        height: 90,
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            }, 200);
        });
    }

    async function syncFromCloud() {
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return alert("Chưa có URL Cloud!");
        const res = await fetch(URL_APPS_SCRIPT);
        const data = await res.json();
        inventory = data;
        render();
    }

    render();
</script>
</body>
</html>
