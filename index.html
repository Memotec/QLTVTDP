<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - ĐỘI THÔNG TIN</title>
    
    <!-- Thư viện QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <!-- Thư viện Xuất Word chuyên nghiệp -->
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --word: #2b579a; --edit: #0ea5e9; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); padding: 10px; color: var(--txt); }
        
        /* Login */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }

        .no-print { max-width: 1400px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e2e8f0; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 4px; outline-color: var(--p); }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; transition: 0.3s; }
        
        .admin-view { display: none; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(7, 1fr); }
            .full { grid-column: span 2; }
            .actions { grid-template-columns: repeat(6, 1fr); }
        }

        table { width:100%; border-collapse:collapse; min-width:1100px; text-align: center; background: white; }
        th { background: #f8fafc; color: #64748b; font-size: 12px; padding: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* VÙNG IN */
        #printArea, #labelArea, #repairFormArea { display: none; }
        @media print {
            .no-print { display: none !important; }
            body.printing-report #printArea { display: block !important; padding: 10mm; }
            .sop-table { width: 100%; border-collapse: collapse; }
            .sop-table th, .sop-table td { border: 1px solid black; padding: 8px; }
            body.printing-labels #labelArea { display: grid !important; grid-template-columns: repeat(3, 62mm); gap: 2mm; justify-content: center; }
            .label-box { width: 62mm; height: 35mm; border: 0.5pt solid #000; padding: 1.5mm; display: flex; flex-direction: column; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color: var(--p); margin-bottom: 20px;">CNS/ATM MANAGEMENT</h2>
        <input type="text" id="user" placeholder="Tài khoản (admin/guest)">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="checkLogin()" style="background:var(--p); width:100%; padding:14px;">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="no-print" id="mainApp">
    <div class="card admin-view" id="adminForm">
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            <div class="full"><label>Tên thiết bị</label><input type="text" id="inName"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>SL</label><input type="number" id="inQty" value="1"></div>
            <div class="full"><label>Vị trí</label><input type="text" id="inLoc"></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="btnAdd" style="background:var(--p); flex: 2;" onclick="addItem()">➕ Thêm mới</button>
            <button id="btnUpdate" style="background:var(--edit); flex: 2; display:none;" onclick="updateItem()">💾 Lưu thay đổi</button>
            <button style="background:#94a3b8; flex: 1;" onclick="clearForm()">Làm mới</button>
        </div>
    </div>

    <div class="card">
        <div class="actions">
            <button style="background:#6366f1" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button style="background:var(--word)" onclick="exportToWord()">📝 Xuất File Word</button>
            <button style="background:#f59e0b" onclick="printLabels()">🏷️ In nhãn QR</button>
            <button style="background:#0f172a" onclick="printReport()">📄 Báo cáo SOP</button>
            <button style="background:var(--danger)" onclick="printRepairForm()">🛠️ Phiếu sửa chữa</button>
            <button style="background:#64748b" onclick="location.reload()">🔒 Đăng xuất</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm nhanh thiết bị..." style="width:100%; padding:15px; border-radius:12px; border:1px solid #cbd5e1; margin-bottom:15px;">

    <div style="overflow-x:auto; border-radius:12px; border:1px solid #e2e8f0; background: white;">
        <table>
            <thead>
                <tr>
                    <th>STT</th><th style="text-align: left;">Tên thiết bị</th>
                    <th>P/N</th><th>S/N</th><th>Mã CCDC</th><th>Kho</th><th>SL</th><th>Vị trí</th>
                    <th>Sửa</th><th class="admin-view">Xóa</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<!-- CÁC VÙNG IN ẨN -->
<div id="printArea">
    <h2 style="text-align: center;">DANH MỤC THIẾT BỊ CNS/ATM</h2>
    <table class="sop-table"><thead id="sopHead"></thead><tbody id="sopBody"></tbody></table>
</div>
<div id="labelArea"></div>
<div id="repairFormArea">
    <h2 style="text-align: center;">PHIẾU BÁO SỬA CHỮA</h2>
    <p>Thiết bị: <b id="repName"></b> | S/N: <b id="repSN"></b></p>
</div>

<script>
    // CẤU HÌNH WEB APP URL CỦA ANH VÀO ĐÂY
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOhq-bmhvxGeFz1oCaXoiJRJTpTtckexhNxSTNT4BmcuxtfEUENqHZrPNpxTD_xuXJ/exec"; 
    
    let inventory = JSON.parse(localStorage.getItem('cns_v24')) || [];
    let currentUserRole = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if (u === 'admin' && p === 'admin') currentUserRole = 'admin';
        else if (u === 'guest' && p === '123456') currentUserRole = 'guest';
        else return alert("Sai tài khoản!");

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        if (currentUserRole === 'admin') {
            document.querySelectorAll('.admin-view').forEach(el => el.style.display = 'block');
        }
        render();
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const labels = document.getElementById('labelArea');
        const search = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = ''; labels.innerHTML = '';

        inventory.forEach((item, idx) => {
            if (item.name.toLowerCase().includes(search) || item.sn.toLowerCase().includes(search)) {
                tbody.innerHTML += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td style="text-align:left"><b>${item.name}</b></td>
                        <td>${item.pn}</td><td>${item.sn}</td><td>${item.code}</td>
                        <td>${item.warehouse || ''}</td><td>${item.qty}</td><td>${item.loc}</td>
                        <td><button onclick="selectItem(${idx})" style="background:var(--edit)">Chọn</button></td>
                        ${currentUserRole === 'admin' ? `<td><button onclick="deleteItem(${idx})" style="background:var(--danger)">✕</button></td>` : '<td>-</td>'}
                    </tr>`;
                
                // Tạo nhãn QR
                const qrId = `qr-${idx}`;
                labels.innerHTML += `
                    <div class="label-box">
                        <div style="font-size:7pt; font-weight:bold; text-align:center; border-bottom:0.5pt solid #000">ĐỘI THÔNG TIN - TT BĐKT</div>
                        <div style="display:flex; align-items:center; flex:1">
                            <div style="flex:1.5; font-size:7pt;"><b>${item.name}</b><br>SN: ${item.sn}<br>CCDC: ${item.code}</div>
                            <div style="flex:1" id="${qrId}"></div>
                        </div>
                    </div>`;
                setTimeout(() => {
                    const el = document.getElementById(qrId);
                    if(el) el.appendChild(kjua({render:'image', size:150, text:item.sn}));
                }, 50);
            }
        });
    }

    async function saveData() {
        localStorage.setItem('cns_v24', JSON.stringify(inventory));
        render();
        if (WEB_APP_URL && currentUserRole === 'admin') {
            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(inventory) });
            } catch (e) { console.error("Cloud Sync Error"); }
        }
    }

    function addItem() {
        inventory.push({
            name: document.getElementById('inName').value, pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value, code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value, qty: document.getElementById('inQty').value,
            loc: document.getElementById('inLoc').value
        });
        saveData(); clearForm();
    }

    function selectItem(idx) {
        const item = inventory[idx];
        if(currentUserRole==='admin'){
            document.getElementById('editIndex').value = idx;
            document.getElementById('inName').value = item.name;
            document.getElementById('inSN').value = item.sn;
            document.getElementById('btnAdd').style.display = 'none';
            document.getElementById('btnUpdate').style.display = 'block';
        }
        document.getElementById('repName').innerText = item.name;
        document.getElementById('repSN').innerText = item.sn;
    }

    function deleteItem(idx) { if(confirm("Xóa thiết bị này?")) { inventory.splice(idx,1); saveData(); } }
    function clearForm() { document.querySelectorAll('.form-grid input').forEach(i => i.value = i.id==='inQty'?'1':''); document.getElementById('btnAdd').style.display='block'; document.getElementById('btnUpdate').style.display='none'; }

    async function syncFromCloud() {
        try {
            const r = await fetch(WEB_APP_URL);
            const d = await r.json();
            inventory = d; saveData(); alert("Đã cập nhật từ Cloud!");
        } catch(e) { alert("Lỗi đồng bộ!"); }
    }

    // ==========================================
    // TÍNH NĂNG XUẤT FILE WORD
    // ==========================================
    function exportToWord() {
        if (inventory.length === 0) return alert("Không có dữ liệu!");
        const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType, AlignmentType, TextRun } = docx;

        const tableRows = [
            new TableRow({
                children: ["STT", "Tên thiết bị", "P/N", "S/N", "Mã CCDC", "Số lượng", "Vị trí"].map(text => 
                    new TableCell({
                        children: [new Paragraph({ children: [new TextRun({ text, bold: true })], alignment: AlignmentType.CENTER })],
                        background: { fill: "E2E8F0" }
                    })
                )
            })
        ];

        inventory.forEach((item, idx) => {
            tableRows.push(new TableRow({
                children: [(idx+1).toString(), item.name, item.pn, item.sn, item.code, item.qty.toString(), item.loc].map(t => 
                    new TableCell({ children: [new Paragraph({ text: t || "" })] })
                )
            }));
        });

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({ children: [new TextRun({ text: "TỔNG CÔNG TY QUẢN LÝ BAY VIỆT NAM", bold: true })], alignment: AlignmentType.CENTER }),
                    new Paragraph({ children: [new TextRun({ text: "ĐỘI THÔNG TIN - TT BẢO ĐẢM KỸ THUẬT", bold: true })], alignment: AlignmentType.CENTER }),
                    new Paragraph({ children: [new TextRun({ text: "DANH MỤC THIẾT BỊ CNS/ATM", bold: true, size: 28, break: 1 })], alignment: AlignmentType.CENTER }),
                    new Paragraph({ text: "", break: 1 }),
                    new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: tableRows }),
                    new Paragraph({ children: [new TextRun({ text: `Ngày xuất: ${new Date().toLocaleDateString('vi-VN')}`, italics: true, break: 1 })], alignment: AlignmentType.RIGHT })
                ]
            }]
        });

        Packer.toBlob(doc).then(blob => saveAs(blob, "Danh_muc_CNS_ATM.docx"));
    }

    function printLabels() { document.body.className = "printing-labels"; window.print(); }
    function printReport() { 
        document.getElementById('sopBody').innerHTML = document.getElementById('inventoryBody').innerHTML;
        document.body.className = "printing-report"; window.print(); 
    }
    function printRepairForm() { document.body.className = "printing-repair"; window.print(); }
</script>
</body>
</html>
