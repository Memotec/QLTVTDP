<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - TRẦN VĂN TRƯỜNG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        .no-print { max-width: 1250px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 4px; outline: none; }
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 14px; }
        .btn-add { background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-excel { background: #10b981; }
        .btn-label { background: #f59e0b; }
        .btn-print { background: #0f172a; }
        
        table { width: 100%; border-collapse: collapse; }
        thead { display: none; }
        tbody tr { display: block; background: white; border-radius: 10px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        tbody td { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; align-items: center; }
        tbody td::before { content: attr(data-label); font-weight: 700; color: #64748b; font-size: 12px; flex: 1; text-align: left; }
        
        /* Hiệu ứng khi ô có thể chỉnh sửa */
        .editable { cursor: pointer; color: var(--p); font-weight: 500; text-decoration: underline dotted; }
        .qr-container { background: #fff; padding: 5px; border: 1px solid #eee; display: inline-block; }

        @media (min-width: 768px) {
            body { padding: 20px; }
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .full { grid-column: span 2; }
            .actions { grid-template-columns: repeat(5, 1fr); }
            thead { display: table-header-group; background: #f8fafc; }
            tbody tr { display: table-row; }
            tbody td { display: table-cell; text-align: center; border-bottom: 1px solid #e2e8f0; padding: 12px; }
            tbody td::before { display: none; }
        }

        #printArea, #labelArea { display: none; }
        @media print {
            .no-print { display: none !important; }
            body.printing-report #printArea { display: block !important; }
            #printTable { width: 100%; border-collapse: collapse; }
            #printTable th, #printTable td { border: 1px solid #000; padding: 6px; font-size: 11px; text-align: center; }
            body.printing-labels #labelArea { display: grid !important; grid-template-columns: repeat(3, 55mm); gap: 2mm; justify-content: center; padding: 10mm 0; }
            .label-box { width: 55mm; height: 30mm; border: 0.5pt solid #000; padding: 1.5mm; display: flex; justify-content: space-between; align-items: center; page-break-inside: avoid; }
            .label-text { font-size: 6.5pt; line-height: 1.2; font-weight: bold; flex: 1; text-transform: uppercase; }
            .label-qr-wrap { width: 22mm; height: 22mm; }
            .label-qr-wrap img { width: 100% !important; height: auto !important; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div style="margin-bottom: 15px; text-align: center;">
        <h2 style="color: var(--p); font-size: 18px;">QUẢN LÝ THIẾT BỊ CNS/ATM</h2>
        <p style="font-size: 12px; color: #64748b;">Kỹ thuật viên: <b>Trần Văn Trường</b></p>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="full"><label>Tên thiết bị / Model</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí lắp đặt</label><input type="text" id="inLoc"></div>
        </div>
        
        <div class="actions">
            <button class="btn-add" onclick="addItem()">➕ Thêm & Lưu Cloud</button>
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Xuất Excel</button>
            <button class="btn-label" onclick="printLabels()">🏷️ Xuất nhãn dán</button>
            <button class="btn-print" onclick="printReport()">📄 In Báo Cáo</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm nhanh thiết bị..." style="width:100%; padding:14px; border-radius:10px; border:1px solid #cbd5e1; margin-bottom: 15px; font-size: 16px;">

    <table>
        <thead>
            <tr>
                <th>STT</th><th>Thiết bị</th><th>Mã CCDC</th><th>Kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th><th>QR</th><th>Xóa</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<div id="printArea">
    <div style="text-align: center; margin-bottom: 20px;">
        <p>TRUNG TÂM BẢO ĐẢM KỸ THUẬT - ĐỘI THÔNG TIN</p>
        <br><h2>DANH MỤC THIẾT BỊ CNS/ATM</h2><p id="printDate"></p>
    </div>
    <table id="printTable">
        <thead><tr><th>STT</th><th>Thiết bị</th><th>Mã CCDC</th><th>Mã Kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th></tr></thead>
        <tbody id="printTableBody"></tbody>
    </table>
</div>

<div id="labelArea"></div>

<script>
    const STORAGE_KEY = 'atcc_inventory_v5';
    const PASS_KEY = "123456";
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbz3g8qLp38h2DYVp6Y5FCsur1h-TsEwJ5Y6_D3oVtTu8M_rpZD1tviNG3tcu3ex-LLu/exec";

    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    function saveAll() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
        if (!URL_APPS_SCRIPT.includes("DÁN_URL")) {
            fetch(URL_APPS_SCRIPT, { method: "POST", mode: "no-cors", body: JSON.stringify(inventory) });
        }
    }

    function editField(id, field, currentVal) {
        const pass = prompt("Nhập mật khẩu để thay đổi nội dung:");
        if (pass === PASS_KEY) {
            const newVal = prompt("Nhập nội dung mới:", currentVal);
            if (newVal !== null) {
                const index = inventory.findIndex(i => i.id === id);
                if (index !== -1) {
                    inventory[index][field] = newVal;
                    saveAll();
                }
            }
        } else if (pass !== null) {
            alert("Sai mật khẩu!");
        }
    }

    function addItem() {
        const item = {
            id: Date.now(),
            name: document.getElementById('inName').value,
            code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value,
            pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value,
            loc: document.getElementById('inLoc').value
        };
        if(!item.code || !item.name) return alert("Thiếu thông tin!");
        inventory.push(item);
        saveAll();
        ['inName','inCode','inWarehouse','inPN','inSN','inLoc'].forEach(id => document.getElementById(id).value = '');
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        const lArea = document.getElementById('labelArea');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        tbody.innerHTML = ''; pBody.innerHTML = ''; lArea.innerHTML = '';
        const filtered = inventory.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(search)));

        filtered.forEach((item, idx) => {
            const qrT = `qt-${item.id}`; const qrL = `ql-${item.id}`;

            tbody.innerHTML += `<tr>
                <td data-label="STT">${idx+1}</td>
                <td data-label="Thiết bị" class="editable" onclick="editField(${item.id}, 'name', '${item.name}')"><b>${item.name}</b></td>
                <td data-label="Mã CCDC" class="editable" onclick="editField(${item.id}, 'code', '${item.code}')">${item.code}</td>
                <td data-label="Mã Kho" class="editable" onclick="editField(${item.id}, 'warehouse', '${item.warehouse}')">${item.warehouse || '-'}</td>
                <td data-label="P/N" class="editable" onclick="editField(${item.id}, 'pn', '${item.pn}')">${item.pn || '-'}</td>
                <td data-label="S/N" class="editable" onclick="editField(${item.id}, 'sn', '${item.sn}')">${item.sn || '-'}</td>
                <td data-label="Vị trí" class="editable" onclick="editField(${item.id}, 'loc', '${item.loc}')">${item.loc || '-'}</td>
                <td data-label="QR Code"><div id="${qrT}" class="qr-container"></div></td>
                <td data-label="Hành động"><button style="background:var(--danger); padding:5px 10px;" onclick="deleteItem(${item.id})">Xóa</button></td>
            </tr>`;
            
            pBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;

            lArea.innerHTML += `<div class="label-box">
                <div class="label-text">TB: ${item.name}<br>CCDC: ${item.code}<br>S/N: ${item.sn}<br>VT: ${item.loc}</div>
                <div id="${qrL}" class="label-qr-wrap"></div>
            </div>`;

            setTimeout(() => {
                const txt = `TB: ${item.name}\nCCDC: ${item.code}\nS/N: ${item.sn}\nVT: ${item.loc}`;
                if(document.getElementById(qrT)) new QRCode(document.getElementById(qrT), { text: txt, width: 60, height: 60 });
                if(document.getElementById(qrL)) new QRCode(document.getElementById(qrL), { text: txt, width: 80, height: 80 });
            }, 100);
        });
        document.getElementById('printDate').innerText = "Ngày in: " + new Date().toLocaleDateString('vi-VN');
    }

    function printReport() { document.body.className = "printing-report"; window.print(); }
    function printLabels() { document.body.className = "printing-labels"; window.print(); }
    
    function deleteItem(id) {
        if(confirm("Xóa thiết bị này?") && prompt("Mật khẩu:") === PASS_KEY) {
            inventory = inventory.filter(i => i.id !== id);
            saveAll();
        }
    }

    function exportCSV() {
        let csv = "\ufeffSTT,Thiet Bi,Ma CCDC,S/N,Vi Tri\n";
        inventory.forEach((i, idx) => csv += `${idx+1},${i.name},${i.code},${i.sn},${i.loc}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `Du_lieu_CNS.csv`; link.click();
    }

    async function syncFromCloud() {
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return alert("Chưa có URL Cloud!");
        try {
            const res = await fetch(URL_APPS_SCRIPT);
            const data = await res.json();
            if (data) { inventory = data; render(); }
        } catch (e) { alert("Lỗi đồng bộ!"); }
    }
    render();
</script>
</body>
</html>
