<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUẢN LÝ CNS/ATM - ATCC/HCM</title>
    <!-- Sử dụng thư viện kjua để tạo mã QR dạng Image siêu nét -->
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 8px; outline: none; }
        
        .no-print { max-width: 1200px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        
        .btn-add { background: var(--p); width: 100%; margin-top: 10px; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin-top: 15px; }
        .actions button { padding: 10px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: 600; }
        
        .table-container { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        
        .admin-only { display: none; }

        /* CSS PHỤC VỤ IN NHÃN - QUAN TRỌNG ĐỂ QUÉT ĐƯỢC */
        #labelArea { display: none; }
        @media print {
            @page { size: A4 portrait; margin: 0; }
            .no-print, #loginOverlay { display: none !important; }
            #labelArea { 
                display: grid !important; 
                grid-template-columns: repeat(3, 65mm); 
                gap: 2mm; 
                padding: 10mm;
                justify-content: center;
            }
            .label-box { 
                width: 65mm; 
                height: 38mm; 
                border: 0.5pt solid #000; 
                display: flex; 
                align-items: center; 
                padding: 3mm;
                page-break-inside: avoid;
                overflow: hidden;
            }
            .label-text { 
                flex: 1; 
                font-size: 8pt; 
                line-height: 1.4; 
                font-weight: bold; 
                text-transform: uppercase;
                padding-right: 2mm;
            }
            .label-qr-wrap { 
                width: 26mm; 
                height: 26mm; 
                display: flex;
                align-items: center;
                justify-content: center;
            }
            /* Đảm bảo ảnh QR không bị mờ khi in */
            .label-qr-wrap img { 
                width: 100% !important; 
                height: 100% !important; 
                image-rendering: pixelated; 
            }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>QUẢN LÝ THIẾT BỊ CNS</h3>
        <input type="text" id="user" placeholder="Tài khoản">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button class="btn-add" onclick="checkLogin()">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="no-print" id="mainApp">
    <div class="card admin-only">
        <h4 style="margin-bottom:10px">THÊM THIẾT BỊ MỚI</h4>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
            <input type="text" id="inName" placeholder="Tên thiết bị">
            <input type="text" id="inPN" placeholder="P/N">
            <input type="text" id="inSN" placeholder="S/N">
            <input type="text" id="inLoc" placeholder="Vị trí">
        </div>
        <button id="btnAdd" class="btn-add" onclick="addItem()">LƯU VÀ ĐỒNG BỘ SHEET</button>
    </div>

    <div class="card">
        <div class="actions">
            <button style="background:#6366f1" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button style="background:#f59e0b" onclick="window.print()">🏷️ IN NHÃN QR (SIÊU NHẠY)</button>
            <button style="background:#64748b" onclick="location.reload()">🔒 Thoát</button>
        </div>
    </div>

    <div class="table-container card">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>STT</th><th>Thiết bị</th><th>P/N</th><th>S/N</th><th>Vị trí</th>
                </tr>
            </thead>
            <tbody id="mainTable"></tbody>
        </table>
    </div>
</div>

<div id="labelArea"></div>

<script>
    // 1. THAY LINK APPS SCRIPT CỦA ANH VÀO ĐÂY
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzeLtgKbAowgUWWHwpxK4SvqlMHBbFA5aWT-YsO0334r3vR9zIUvr7XZ-O81EdFz3pZ/exec"; 
    const STORAGE_KEY = 'cns_atcc_v8';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentUser = null;

    function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if (u === 'admin' && p === 'admin') currentUser = 'admin';
        else if (u === 'guest' && p === '123456') currentUser = 'guest';
        else return alert("Sai tài khoản!");
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        render();
    }

    async function addItem() {
        const item = {
            name: document.getElementById('inName').value,
            pn: document.getElementById('inPN').value || "-",
            sn: document.getElementById('inSN').value,
            loc: document.getElementById('inLoc').value || "-",
            action: "add"
        };
        if(!item.name || !item.sn) return alert("Nhập Tên và S/N!");
        
        inventory.push(item);
        saveData();
        try {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
            alert("Đã lưu!");
        } catch(e) { console.log(e); }
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const lArea = document.getElementById('labelArea');
        tbody.innerHTML = ''; lArea.innerHTML = '';

        inventory.forEach((item, idx) => {
            tbody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;

            // TẠO NHÃN IN
            const containerId = `qr-${idx}`;
            lArea.innerHTML += `
                <div class="label-box">
                    <div class="label-text">
                        CNS/ATM - ATCC HCM<br>
                        TB: ${item.name}<br>
                        P/N: ${item.pn}<br>
                        S/N: ${item.sn}<br>
                        VT: ${item.loc}
                    </div>
                    <div id="${containerId}" class="label-qr-wrap"></div>
                </div>`;

            // Render QR bằng KJUA (Tạo thẻ IMG thay vì Canvas)
            setTimeout(() => {
                const el = document.getElementById(containerId);
                const qrImg = kjua({
                    render: 'image', // Ép kiểu image để điện thoại dễ quét
                    size: 200,
                    text: `${WEB_APP_URL}?sn=${encodeURIComponent(item.sn)}`,
                    ecLevel: 'L', // Level thấp để ô vuông to, rõ
                    fill: '#000000',
                    back: '#ffffff',
                    quiet: 1 // Lề trắng xung quanh mã QR
                });
                el.appendChild(qrImg);
            }, 50);
        });

        if (currentUser === 'admin') document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); render(); }
    async function syncFromCloud() {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        if(data) { inventory = data; saveData(); alert("Đã đồng bộ!"); }
    }
</script>
</body>
</html>
