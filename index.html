<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG QUẢN LÝ THIẾT BỊ CNS/ATM</title>
    
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --word: #2b579a; --edit: #0ea5e9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }

        .no-print { max-width: 1400px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e2e8f0; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 4px; }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; }
        
        .admin-only { display: none; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .full { grid-column: span 2; }
            .actions { grid-template-columns: repeat(6, 1fr); }
        }

        /* --- CẤU HÌNH IN NHÃN DÁN (LABEL PRINTING) --- */
        #labelArea, #printArea, #repairFormArea { display: none; }
        
        @media print {
            @page { 
                size: A4 portrait; 
                margin: 10mm; /* Giảm lề trang in để tận dụng diện tích nhãn */
            }
            .no-print { display: none !important; }
            body { background: white; padding: 0; }

            /* Định dạng nhãn dán khi in */
            body.printing-labels #labelArea { 
                display: grid !important; 
                grid-template-columns: repeat(3, 62mm); 
                gap: 2mm; 
                justify-content: center;
            }
            .label-box { 
                width: 62mm; 
                height: 35mm; 
                border: 0.5pt solid #000; 
                display: flex; 
                flex-direction: row;
                align-items: center; 
                padding: 1.5mm;
                overflow: hidden;
                page-break-inside: avoid;
                font-family: Arial, sans-serif;
            }
            .label-info { 
                flex: 1; 
                font-size: 7.5pt; 
                line-height: 1.25; 
                font-weight: bold; 
                text-transform: uppercase;
                color: #000;
                padding-right: 1mm;
            }
            .label-qr-code { 
                width: 25mm; 
                height: 25mm; 
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .label-qr-code img { 
                max-width: 100%; 
                max-height: 100%; 
            }

            /* Các vùng in khác */
            body.printing-report #printArea { display: block !important; }
            body.printing-repair #repairFormArea { display: block !important; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>HỆ THỐNG CNS/ATM</h3>
        <input type="text" id="user" placeholder="Tên đăng nhập">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="checkLogin()" style="background:var(--p); width:100%; padding:12px;">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="no-print" id="mainApp">
    <!-- Khối nhập liệu Admin -->
    <div class="card admin-only">
        <h4 style="color: var(--p); margin-bottom: 10px;">CẬP NHẬT THIẾT BỊ</h4>
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            <div class="full"><label>Tên thiết bị</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí</label><input type="text" id="inLoc"></div>
        </div>
        <button id="btnAdd" style="background:var(--p); margin-top:10px; width:100%" onclick="addItem()">➕ Thêm thiết bị</button>
        <button id="btnUpdate" style="background:var(--edit); margin-top:10px; width:100%; display:none;" onclick="updateItem()">💾 Lưu thay đổi</button>
    </div>

    <!-- Thanh công cụ -->
    <div class="card">
        <div class="actions">
            <button style="background:#6366f1" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button style="background:var(--word)" onclick="exportToWord()">📝 Xuất Word</button>
            <button style="background:#f59e0b" onclick="printLabels()">🏷️ Xuất nhãn dán</button>
            <button style="background:#0f172a" onclick="printReport()">📄 Báo cáo SOP</button>
            <button style="background:#ef4444" onclick="printRepairForm()">🛠️ Phiếu sửa chữa</button>
            <button style="background:#64748b" onclick="location.reload()">🔒 Thoát</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #cbd5e1; margin-bottom:15px;">

    <div style="overflow-x:auto; background:white; border-radius:8px; border:1px solid #e2e8f0;">
        <table style="width:100%; border-collapse:collapse; min-width:1000px; text-align: center;">
            <thead style="background:#f8fafc;">
                <tr>
                    <th>STT</th><th>Thiết bị</th><th>CCDC</th><th>P/N</th><th>S/N</th><th>Vị trí</th>
                    <th>Thao tác</th><th class="admin-only">Xóa</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<!-- Vùng nhãn dán khi in -->
<div id="labelArea"></div>

<!-- Các vùng in khác giữ nguyên logic cũ -->
<div id="printArea"></div>
<div id="repairFormArea"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzeLtgKbAowgUWWHwpxK4SvqlMHBbFA5aWT-YsO0334r3vR9zIUvr7XZ-O81EdFz3pZ/exec"; 
    const STORAGE_KEY = 'cns_v16_final';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentUserRole = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if (u === 'admin' && p === 'admin') currentUserRole = 'admin';
        else if (u === 'guest' && p === '123456') currentUserRole = 'guest';
        else return alert("Sai tài khoản!");

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        if (currentUserRole === 'admin') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = (el.tagName === 'TD' || el.tagName === 'TH') ? 'table-cell' : 'block');
        }
        render();
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const labels = document.getElementById('labelArea');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        tbody.innerHTML = ''; labels.innerHTML = '';
        const filtered = inventory.filter(i => i.name.toLowerCase().includes(search) || i.sn.toLowerCase().includes(search));

        filtered.forEach((item, idx) => {
            const ridx = inventory.indexOf(item);
            
            // Render hàng trong bảng
            let row = `<tr>
                <td>${idx+1}</td>
                <td style="text-align:left"><b>${item.name}</b></td>
                <td>${item.code}</td>
                <td>${item.pn}</td>
                <td>${item.sn}</td>
                <td>${item.loc}</td>
                <td><button onclick="selectForPrint(${ridx})" style="background:var(--edit); padding:4px 8px;">Chọn in</button></td>`;
            if(currentUserRole === 'admin') row += `<td class="admin-only"><button onclick="deleteItem(${ridx})" style="background:#ef4444; padding:4px 8px;">X</button></td>`;
            row += `</tr>`;
            tbody.innerHTML += row;

            // Render nhãn dán QR
            const qrId = `qr-code-${idx}`;
            const labelHtml = `
                <div class="label-box">
                    <div class="label-info">
                        CNS/ATM - ATCC HCM<br>
                        TB: ${item.name.substring(0, 30)}<br>
                        P/N: ${item.pn}<br>
                        S/N: ${item.sn}<br>
                        VT: ${item.loc}
                    </div>
                    <div class="label-qr-code" id="${qrId}"></div>
                </div>`;
            labels.innerHTML += labelHtml;

            // Tạo QR Code ngay lập tức
            setTimeout(() => {
                const qrContainer = document.getElementById(qrId);
                if(qrContainer) {
                    qrContainer.appendChild(kjua({
                        render: 'image',
                        size: 200,
                        text: `ITEM:${item.sn}|PN:${item.pn}`, // Nội dung quét được
                        fill: '#000',
                        back: '#fff',
                        quiet: 1,
                        mode: 'plain'
                    }));
                }
            }, 50);
        });
    }

    function selectForPrint(idx) {
        const item = inventory[idx];
        if(currentUserRole === 'admin') {
            document.getElementById('editIndex').value = idx;
            document.getElementById('inName').value = item.name;
            document.getElementById('inSN').value = item.sn;
            document.getElementById('btnAdd').style.display = 'none';
            document.getElementById('btnUpdate').style.display = 'block';
        }
        alert(`Đã chọn: ${item.name}. Anh có thể in Nhãn dán hoặc Phiếu sửa chữa cho thiết bị này.`);
    }

    function printLabels() {
        if(inventory.length === 0) return alert("Không có dữ liệu để xuất nhãn!");
        document.body.className = "printing-labels";
        window.print();
    }

    // Các hàm phụ trợ khác (Thêm, Xóa, Lưu, Sync...) giữ nguyên như bản trước để tránh thay đổi chức năng.
    function addItem() {
        inventory.push({ name: document.getElementById('inName').value, code: document.getElementById('inCode').value, pn: document.getElementById('inPN').value, sn: document.getElementById('inSN').value, loc: document.getElementById('inLoc').value });
        saveData(); clearForm();
    }
    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx] = { name: document.getElementById('inName').value, code: document.getElementById('inCode').value, pn: document.getElementById('inPN').value, sn: document.getElementById('inSN').value, loc: document.getElementById('inLoc').value };
        saveData(); document.getElementById('btnAdd').style.display = 'block'; document.getElementById('btnUpdate').style.display = 'none'; clearForm();
    }
    function deleteItem(idx) { if(confirm("Xóa thiết bị?")) { inventory.splice(idx,1); saveData(); } }
    function clearForm() { ['inName','inCode','inPN','inSN','inLoc','inWarehouse'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; }); }
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); render(); }
    async function syncFromCloud() {
        try { const r = await fetch(WEB_APP_URL); const d = await r.json(); if(d) { inventory = d; saveData(); alert("Đồng bộ thành công!"); } } 
        catch(e) { alert("Lỗi kết nối Cloud!"); }
    }
</script>
</body>
</html>
