<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - ĐỘI THÔNG TIN</title>
    
    <!-- Thư viện hỗ trợ -->
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --word: #2b579a; --edit: #0ea5e9; --danger: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--txt); line-height: 1.5; }
        
        /* Login */
        #loginOverlay { position: fixed; inset: 0; background: #e2e8f0; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; display: none; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        /* Form & Search */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .full-width { grid-column: 1 / -1; }
        label { font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: var(--p); outline: none; box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1); }
        
        .search-box { position: sticky; top: 10px; z-index: 100; }
        #searchInput { border: 2px solid var(--p); font-size: 16px; padding: 15px 20px; }

        /* Buttons */
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        button { padding: 10px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; color: white; transition: all 0.2s; font-size: 13px; }
        button:active { transform: scale(0.98); }
        .btn-p { background: var(--p); }
        .btn-word { background: var(--word); }
        .btn-edit { background: var(--edit); }
        .btn-danger { background: var(--danger); }
        .btn-sync { background: var(--success); }

        /* Table */
        .table-container { overflow-x: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8fafc; padding: 12px; text-align: center; font-size: 12px; color: #475569; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 14px; }
        tr:hover { background: #fcfdfe; }

        /* Print Settings */
        #labelArea { display: none; }
        @media print {
            .no-print { display: none !important; }
            #labelArea { display: grid !important; grid-template-columns: repeat(3, 62mm); gap: 2mm; padding: 5mm; }
            .label-box { width: 62mm; height: 35mm; border: 0.5pt solid #000; padding: 2mm; display: flex; flex-direction: column; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<!-- GIAO DIỆN ĐĂNG NHẬP -->
<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color: var(--p); margin-bottom: 5px;">HỆ THỐNG CNS/ATM</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Đội Thông tin - Trung tâm BĐKT</p>
        <input type="text" id="user" placeholder="Tên đăng nhập (admin/guest)">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="checkLogin()" class="btn-p" style="width: 100%; margin-top: 10px; padding: 15px;">XÁC NHẬN</button>
    </div>
</div>

<div class="container no-print" id="mainContent">
    <!-- FORM NHẬP LIỆU (CHỈ HIỆN KHI LÀ ADMIN) -->
    <div class="card" id="adminArea" style="display: none;">
        <h3 style="margin-bottom: 15px; font-size: 16px;">Cập nhật thông tin thiết bị</h3>
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            <div class="full-width"><label>Tên thiết bị</label><input type="text" id="inName"></div>
            <div><label>P/N (Mã phần cứng)</label><input type="text" id="inPN"></div>
            <div><label>S/N (Số sê-ri)</label><input type="text" id="inSN"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>Số lượng</label><input type="number" id="inQty" value="1"></div>
            <div class="full-width"><label>Vị trí lắp đặt/lưu kho</label><input type="text" id="inLoc"></div>
        </div>
        <div class="btn-group">
            <button id="btnAdd" class="btn-p" onclick="addItem()" style="flex: 2;">➕ Thêm vào danh sách</button>
            <button id="btnUpdate" class="btn-edit" onclick="updateItem()" style="flex: 2; display: none;">💾 Lưu chỉnh sửa</button>
            <button onclick="clearForm()" style="background: #94a3b8;">Làm mới</button>
        </div>
    </div>

    <!-- CÔNG CỤ TÌM KIẾM VÀ XUẤT DỮ LIỆU -->
    <div class="card search-box">
        <input type="text" id="searchInput" oninput="render()" placeholder="🔍 Tìm kiếm nhanh theo Tên, S/N, P/N hoặc Vị trí...">
        <div class="btn-group">
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ Cloud</button>
            <button class="btn-word" onclick="exportToWord()">📝 Xuất File Word</button>
            <button style="background: #f59e0b;" onclick="printLabels()">🏷️ In nhãn QR</button>
            <button style="background: #0f172a;" onclick="window.print()">📄 In báo cáo</button>
            <button class="btn-danger" onclick="location.reload()">🔒 Thoát</button>
        </div>
    </div>

    <!-- BẢNG HIỂN THỊ -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th style="text-align: left;">Tên thiết bị</th>
                    <th>P/N</th><th>S/N</th><th>Mã CCDC</th><th>Kho</th><th>SL</th><th>Vị trí</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<!-- VÙNG IN NHÃN QR (ẨN TRÊN MÀN HÌNH) -->
<div id="labelArea"></div>

<script>
    // 1. CẤU HÌNH WEB APP URL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOhq-bmhvxGeFz1oCaXoiJRJTpTtckexhNxSTNT4BmcuxtfEUENqHZrPNpxTD_xuXJ/exec";

    let inventory = JSON.parse(localStorage.getItem('cns_data_v25')) || [];
    let currentUserRole = null;

    // 2. XỬ LÝ ĐĂNG NHẬP
    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if (u === 'admin' && p === 'admin') currentUserRole = 'admin';
        else if (u === 'guest' && p === '123456') currentUserRole = 'guest';
        else return alert("Thông tin đăng nhập không chính xác!");

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        if (currentUserRole === 'admin') document.getElementById('adminArea').style.display = 'block';
        render();
    }

    // 3. HÀM HIỂN THỊ & LỌC DỮ LIỆU (Sửa lỗi tìm kiếm)
    function render() {
        const tbody = document.getElementById('inventoryBody');
        const labelArea = document.getElementById('labelArea');
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        
        tbody.innerHTML = '';
        labelArea.innerHTML = '';

        inventory.forEach((item, idx) => {
            const contentString = `${item.name} ${item.sn} ${item.pn} ${item.loc}`.toLowerCase();
            
            if (query === "" || contentString.includes(query)) {
                // Thêm vào bảng
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${idx + 1}</td>
                    <td style="text-align:left"><b>${item.name}</b></td>
                    <td>${item.pn}</td><td>${item.sn}</td><td>${item.code}</td>
                    <td>${item.warehouse}</td><td>${item.qty}</td><td>${item.loc}</td>
                    <td>
                        <button onclick="editItem(${idx})" class="btn-edit" style="padding: 4px 8px;">Chọn</button>
                        ${currentUserRole === 'admin' ? `<button onclick="deleteItem(${idx})" class="btn-danger" style="padding: 4px 8px;">✕</button>` : ''}
                    </td>
                `;

                // Tạo nhãn QR cho in ấn
                const qrId = `qr-${idx}`;
                labelArea.innerHTML += `
                    <div class="label-box">
                        <div style="font-size:7pt; font-weight:bold; text-align:center; border-bottom:0.5pt solid #000; margin-bottom:1mm">ĐỘI THÔNG TIN - TT BĐKT</div>
                        <div style="display:flex; align-items:center; flex:1">
                            <div style="flex:1.5; font-size:7pt; line-height:1.2">
                                <b style="font-size:8pt">${item.name.substring(0,25)}</b><br>
                                PN: ${item.pn}<br>SN: ${item.sn}<br>Mã: ${item.code}
                            </div>
                            <div style="flex:1" id="${qrId}"></div>
                        </div>
                    </div>`;
                
                setTimeout(() => {
                    const el = document.getElementById(qrId);
                    if(el) el.appendChild(kjua({render:'image', size:150, text:item.sn || item.name}));
                }, 50);
            }
        });
    }

    // 4. THAO TÁC DỮ LIỆU
    async function save() {
        localStorage.setItem('cns_data_v25', JSON.stringify(inventory));
        render();
        if (currentUserRole === 'admin' && WEB_APP_URL) {
            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(inventory) });
            } catch (e) { console.log("Cloud Sync Pending..."); }
        }
    }

    function addItem() {
        const name = document.getElementById('inName').value;
        if (!name) return alert("Vui lòng nhập tên thiết bị!");
        inventory.push({
            name, pn: document.getElementById('inPN').value, sn: document.getElementById('inSN').value,
            code: document.getElementById('inCode').value, warehouse: document.getElementById('inWarehouse').value,
            qty: document.getElementById('inQty').value, loc: document.getElementById('inLoc').value
        });
        save(); clearForm();
    }

    function editItem(idx) {
        if(currentUserRole !== 'admin') return alert("Bạn cần quyền Admin để sửa!");
        const item = inventory[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = item.name;
        document.getElementById('inPN').value = item.pn;
        document.getElementById('inSN').value = item.sn;
        document.getElementById('inCode').value = item.code;
        document.getElementById('inWarehouse').value = item.warehouse;
        document.getElementById('inQty').value = item.qty;
        document.getElementById('inLoc').value = item.loc;
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx] = {
            name: document.getElementById('inName').value, pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value, code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value, qty: document.getElementById('inQty').value,
            loc: document.getElementById('inLoc').value
        };
        save(); clearForm();
    }

    function deleteItem(idx) { if(confirm("Xác nhận xóa thiết bị này?")) { inventory.splice(idx,1); save(); } }
    function clearForm() { document.querySelectorAll('.form-grid input').forEach(i => i.value = i.id==='inQty'?'1':''); document.getElementById('btnAdd').style.display='block'; document.getElementById('btnUpdate').style.display='none'; }

    async function syncFromCloud() {
        if(!WEB_APP_URL) return alert("Chưa cấu hình Link Cloud!");
        try {
            const resp = await fetch(WEB_APP_URL);
            const data = await resp.json();
            inventory = data; save(); alert("Đã đồng bộ dữ liệu mới nhất từ Cloud!");
        } catch (e) { alert("Lỗi kết nối Cloud!"); }
    }

    // 5. XUẤT WORD
    function exportToWord() {
        if (inventory.length === 0) return alert("Không có dữ và liệu!");
        const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType, AlignmentType, TextRun } = docx;

        const tableRows = [
            new TableRow({
                children: ["STT", "Tên thiết bị", "P/N", "S/N", "Mã CCDC", "SL", "Vị trí"].map(h => 
                    new TableCell({
                        children: [new Paragraph({ children: [new TextRun({ text: h, bold: true })], alignment: AlignmentType.CENTER })],
                        background: { fill: "F1F5F9" }
                    })
                )
            })
        ];

        inventory.forEach((item, idx) => {
            tableRows.push(new TableRow({
                children: [(idx+1).toString(), item.name, item.pn, item.sn, item.code, item.qty.toString(), item.loc].map(v => 
                    new TableCell({ children: [new Paragraph({ text: v || "" })] })
                )
            }));
        });

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({ children: [new TextRun({ text: "TỔNG CÔNG TY QUẢN LÝ BAY VIỆT NAM", bold: true })], alignment: AlignmentType.CENTER }),
                    new Paragraph({ children: [new TextRun({ text: "TRUNG TÂM BẢO ĐẢM KỸ THUẬT - ĐỘI THÔNG TIN", bold: true })], alignment: AlignmentType.CENTER }),
                    new Paragraph({ children: [new TextRun({ text: "DANH MỤC THIẾT BỊ CNS/ATM", bold: true, size: 30, break: 1 })], alignment: AlignmentType.CENTER }),
                    new Paragraph({ text: "", break: 1 }),
                    new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: tableRows }),
                    new Paragraph({ children: [new TextRun({ text: `Ngày báo cáo: ${new Date().toLocaleDateString('vi-VN')}`, italics: true, break: 1 })], alignment: AlignmentType.RIGHT })
                ]
            }]
        });

        Packer.toBlob(doc).then(blob => saveAs(blob, "DanhMuc_ThietBi_CNS_ATM.docx"));
    }

    function printLabels() { window.print(); }
</script>
</body>
</html>
