<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - ĐỘI THÔNG TIN</title>
    
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --word: #2b579a; --edit: #0ea5e9; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--txt); padding: 15px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center; width: 400px; border: 1px solid #e2e8f0; }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; }

        .container { max-width: 1400px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .section-title { font-size: 14px; font-weight: 700; color: var(--p); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .full { grid-column: span 4; }
        .half { grid-column: span 2; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 12px; font-weight: 600; color: #64748b; }
        .input-group input { padding: 12px 15px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: #f8fafc; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        button { padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 14px; display: flex; align-items: center; gap: 8px; justify-content: center; transition: 0.2s; }
        button:hover { opacity: 0.85; transform: translateY(-1px); }

        input#searchInput { width: 100%; padding: 16px 20px; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 20px; font-size: 16px; transition: 0.3s; }
        input#searchInput:focus { border-color: var(--p); outline: none; }

        /* GIAO DIỆN BẢNG CẢI TIẾN */
        .table-wrap { overflow-x: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8fafc; padding: 16px; font-size: 11px; font-weight: 800; color: #475569; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 14px; color: #1e293b; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f1f5f9; }
        
        .stt-col { color: #64748b; font-weight: 700; background: #f8fafc; width: 50px; }
        .name-col { text-align: left !important; font-weight: 600; color: #0f172a; max-width: 300px; }
        .badge-warehouse { background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 12px; }
        .badge-qty { background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 20px; font-weight: 700; }

        /* PRINT CONFIG */
        #printLabelArea, #printQrOnlyArea { display: none; }
        @media print {
            .no-print { display: none !important; }
            body.printing-labels #printLabelArea { display: grid !important; grid-template-columns: repeat(3, 62mm); gap: 2mm; padding: 5mm; }
            body.printing-qrs #printQrOnlyArea { display: grid !important; grid-template-columns: repeat(6, 30mm); gap: 5mm; padding: 10mm; }
            .label-item { width: 62mm; height: 30mm; border: 0.5pt solid #000; padding: 1.5mm; display: flex; flex-direction: column; page-break-inside: avoid; }
            .qr-only-item { width: 30mm; text-align: center; border: 0.5pt dashed #ccc; padding: 2mm; page-break-inside: avoid; }
            .header-print { font-size:6.5pt; font-weight:bold; text-align:center; border-bottom:0.5pt solid #000; margin-bottom:1mm; padding-bottom:0.5mm; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1 style="color: var(--p); margin-bottom: 5px; font-size: 24px;">CNS/ATM SYSTEM</h1>
        <p style="font-size: 12px; margin-bottom: 30px; color:#64748b;">ĐỘI THÔNG TIN - TT BĐKT HCM</p>
        <input type="text" id="user" placeholder="Tên đăng nhập">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="checkLogin()" style="background:var(--p); width:100%;">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="container no-print" id="mainApp">
    <div class="card" id="adminArea" style="display:none;">
        <div class="section-title">📦 Cập nhật thông tin thiết bị</div>
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            <div class="full input-group"><label>Tên thiết bị / Model</label><input type="text" id="inName"></div>
            <div class="input-group"><label>Part Number (P/N)</label><input type="text" id="inPN"></div>
            <div class="input-group"><label>Serial Number (S/N)</label><input type="text" id="inSN"></div>
            <div class="input-group"><label>Mã Tài Sản</label><input type="text" id="inCode"></div>
            <div class="input-group"><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div class="half input-group"><label>Vị trí lắp đặt</label><input type="text" id="inLoc"></div>
            <div class="half input-group"><label>Số lượng</label><input type="number" id="inQty" value="1"></div>
        </div>
        <div class="btn-group">
            <button id="btnAdd" style="background:var(--p); min-width: 150px;" onclick="addItem()">➕ Thêm mới</button>
            <button id="btnUpdate" style="background:var(--edit); min-width: 150px; display:none;" onclick="updateItem()">💾 Lưu thay đổi</button>
            <button style="background:#94a3b8" onclick="clearForm()">Làm mới</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">🔍 Tra cứu & Trích xuất</div>
        <input type="text" id="searchInput" oninput="render()" placeholder="Tìm kiếm nhanh thiết bị, số serial, mã tài sản...">
        <div class="btn-group">
            <button style="background:var(--success)" onclick="syncCloud()">🔄 Đồng bộ</button>
            <button style="background:var(--word)" onclick="exportToWord()">📝 File Word</button>
            <button style="background:#f59e0b" onclick="doPrint('labels')">🏷️ IN NHÃN DÁN</button>
            <button style="background:var(--p)" onclick="doPrint('qrs')">📱 IN MÃ QR CODE</button>
            <button style="background:var(--danger); margin-left: auto;" onclick="location.reload()">Thoát</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px;">STT</th>
                    <th style="text-align:left">Tên thiết bị / Model</th>
                    <th>Part Number</th>
                    <th>Serial Number</th>
                    <th>Mã Tài Sản</th>
                    <th>Mã Kho</th>
                    <th>SL</th>
                    <th>Vị trí lắp đặt</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>
</div>

<div id="printLabelArea"></div>
<div id="printQrOnlyArea"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOhq-bmhvxGeFz1oCaXoiJRJTpTtckexhNxSTNT4BmcuxtfEUENqHZrPNpxTD_xuXJ/exec";
    let inventory = JSON.parse(localStorage.getItem('cns_data_v26_final')) || [];
    let role = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if ((u === 'admin' && p === 'admin') || (u === 'guest' && p === '123456')) {
            role = u;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            if(role === 'admin') document.getElementById('adminArea').style.display = 'block';
            render();
        } else alert("Sai thông tin!");
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const lblArea = document.getElementById('printLabelArea');
        const qrArea = document.getElementById('printQrOnlyArea');
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        
        tbody.innerHTML = ''; lblArea.innerHTML = ''; qrArea.innerHTML = '';

        inventory.forEach((item, idx) => {
            const match = item.name.toLowerCase().includes(q) || 
                          item.sn.toLowerCase().includes(q) || 
                          item.pn.toLowerCase().includes(q) ||
                          (item.code && item.code.toLowerCase().includes(q));
            
            if (match) {
                tbody.innerHTML += `<tr>
                    <td class="stt-col">${idx+1}</td>
                    <td class="name-col">${item.name}</td>
                    <td style="color: #64748b; font-family: monospace;">${item.pn}</td>
                    <td style="font-weight: 600;">${item.sn}</td>
                    <td>${item.code || '-'}</td>
                    <td><span class="badge-warehouse">${item.warehouse || '-'}</span></td>
                    <td><span class="badge-qty">${item.qty}</span></td>
                    <td style="font-size: 13px; color: #475569;">${item.loc}</td>
                    <td><button style="background:var(--edit); padding: 6px 15px; font-size:12px;" onclick="editItem(${idx})">Sửa</button></td>
                </tr>`;

                lblArea.innerHTML += `
                    <div class="label-item">
                        <div class="header-print">ĐỘI THÔNG TIN - TT BĐKT HCM</div>
                        <div style="font-size:6.5pt; line-height:1.15">
                            <b style="font-size:7pt; display:block; margin-bottom:0.5mm; text-transform:uppercase">${item.name.substring(0,45)}</b>
                            <b>P/N:</b> ${item.pn}<br><b>S/N:</b> ${item.sn}<br><b>Mã TS:</b> ${item.code}<br><b>Mã Kho:</b> ${item.warehouse || '-'}
                        </div>
                    </div>`;

                const qid = `qr-only-${idx}`;
                qrArea.innerHTML += `<div class="qr-only-item"><div id="${qid}"></div><div style="font-size:7pt; font-weight:bold; margin-top:2px;">SN: ${item.sn}</div></div>`;

                const qrContent = `Tên: ${item.name}\nP/N: ${item.pn}\nS/N: ${item.sn}\nMã TS: ${item.code}\nKho: ${item.warehouse || '-'}`;

                setTimeout(() => {
                    const qEl = document.getElementById(qid);
                    if(qEl) qEl.appendChild(kjua({render:'image', size:120, text: qrContent, quiet:1}));
                }, 50);
            }
        });
    }

    function addItem() {
        inventory.push({
            name: document.getElementById('inName').value, pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value, code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value, qty: document.getElementById('inQty').value,
            loc: document.getElementById('inLoc').value
        });
        save(); clearForm();
    }

    function editItem(idx) {
        if(role !== 'admin') return alert("Chỉ Admin mới có quyền sửa!");
        const item = inventory[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = item.name;
        document.getElementById('inPN').value = item.pn;
        document.getElementById('inSN').value = item.sn;
        document.getElementById('inCode').value = item.code;
        document.getElementById('inWarehouse').value = item.warehouse;
        document.getElementById('inQty').value = item.qty;
        document.getElementById('inLoc').value = item.loc;
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        window.scrollTo(0,0);
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx] = {
            name: document.getElementById('inName').value, pn: document.getElementById('inPN').value,
            sn: document.getElementById('inSN').value, code: document.getElementById('inCode').value,
            warehouse: document.getElementById('inWarehouse').value, qty: document.getElementById('inQty').value,
            loc: document.getElementById('inLoc').value
        };
        save(); clearForm();
    }

    async function save() {
        localStorage.setItem('cns_data_v26_final', JSON.stringify(inventory));
        render();
        if(WEB_APP_URL && role === 'admin') {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(inventory) });
        }
    }

    function clearForm() { 
        document.querySelectorAll('.form-grid input').forEach(i => i.value = i.id==='inQty'?'1':''); 
        document.getElementById('btnAdd').style.display='block'; 
        document.getElementById('btnUpdate').style.display='none'; 
    }

    async function syncCloud() {
        try {
            const r = await fetch(WEB_APP_URL);
            inventory = await r.json();
            save(); alert("Đồng bộ thành công!");
        } catch(e) { alert("Lỗi kết nối!"); }
    }

    function doPrint(type) {
        document.body.className = type === 'labels' ? 'printing-labels' : 'printing-qrs';
        window.print();
    }

    function exportToWord() {
        const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType, AlignmentType, TextRun } = docx;
        const rows = [new TableRow({ children: ["STT", "Thiết bị", "P/N", "S/N", "Mã TS", "Kho"].map(t => new TableCell({ children: [new Paragraph({ children: [new TextRun({text:t, bold:true})], alignment: AlignmentType.CENTER })], background:{fill:"F8FAFC"} })) })];
        inventory.forEach((item, i) => {
            rows.push(new TableRow({ children: [(i+1).toString(), item.name, item.pn, item.sn, item.code || "", item.warehouse || ""].map(t => new TableCell({ children: [new Paragraph({text: t || ""})] })) }));
        });
        const doc = new Document({ sections: [{ children: [ new Paragraph({ children: [new TextRun({text:"DANH MỤC THIẾT BỊ CNS/ATM", bold:true, size:28})], alignment: AlignmentType.CENTER }), new Paragraph({text:"", break:1}), new Table({ width: {size:100, type:WidthType.PERCENTAGE}, rows }) ] }] });
        Packer.toBlob(doc).then(blob => saveAs(blob, "Danh_muc_CNS.docx"));
    }
</script>
</body>
</html>
