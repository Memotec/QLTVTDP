<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM - TRẦN VĂN TRƯỜNG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        
        .no-print { max-width: 1400px; margin: 0 auto; display: none; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-top: 4px; outline: none; }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 14px; transition: 0.2s; }
        .btn-add { background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-excel { background: #10b981; }
        .btn-label { background: #f59e0b; }
        .btn-print { background: #0f172a; }
        .btn-repair { background: #ec4899; } /* Màu riêng cho Phiếu báo SD */
        .btn-logout { background: #64748b; margin-top: 10px; width: 100%; }

        .table-container { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background: #f8fafc; font-size: 11px; text-transform: uppercase; color: #64748b; }
        
        .admin-only { display: none; }
        .qr-container { background: #fff; padding: 5px; border: 1px solid #eee; display: inline-block; }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            .full { grid-column: span 2; }
            .actions { grid-template-columns: repeat(6, 1fr); }
        }

        /* --- CẤU TRÚC IN ẤN --- */
        #printArea, #labelArea, #repairArea { display: none; }
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            .no-print, #loginOverlay { display: none !important; }
            body { background: white; padding: 0; color: black; }
            
            /* In Báo cáo SOP */
            body.printing-report #printArea { display: block !important; }
            
            /* In Nhãn */
            body.printing-labels #labelArea { display: grid !important; grid-template-columns: repeat(3, 60mm); gap: 5mm; justify-content: center; }
            .label-box { width: 60mm; height: 35mm; border: 0.5pt solid #000; padding: 3mm; display: flex; align-items: center; page-break-inside: avoid; }
            .label-text { font-size: 7.5pt; line-height: 1.3; font-weight: bold; flex: 1; text-transform: uppercase; }
            .label-qr-wrap { width: 22mm; height: 22mm; }

            /* In Phiếu báo SD thiết bị */
            body.printing-repair #repairArea { display: block !important; }
            .repair-card { border: 2px solid black; padding: 20px; margin-bottom: 20px; page-break-inside: avoid; position: relative; }
            .repair-title { text-align: center; font-weight: bold; font-size: 16pt; margin-bottom: 20px; text-transform: uppercase; }
            .repair-row { display: flex; margin-bottom: 10px; border-bottom: 1px dotted #ccc; padding-bottom: 5px; }
            .repair-label { width: 180px; font-weight: bold; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3 style="margin-bottom: 20px; color: var(--p);">HỆ THỐNG QUẢN LÝ CNS/ATM</h3>
        <input type="text" id="user" placeholder="Tên đăng nhập (admin)">
        <input type="password" id="pass" placeholder="Mật khẩu (admin)">
        <button class="btn-add" style="width: 100%; margin-top: 15px;" onclick="checkLogin()">Đăng nhập</button>
    </div>
</div>

<div class="no-print" id="mainApp">
    <div class="card admin-only">
        <div class="form-grid">
            <div class="full"><label>Tên thiết bị / Model</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí lắp đặt</label><input type="text" id="inLoc"></div>
        </div>
        <div class="actions">
            <button id="btnAdd" class="btn-add" style="grid-column: span 6;" onclick="addItem()">➕ Thêm & Ghi vào Sheet</button>
        </div>
    </div>

    <div class="card">
        <div class="actions">
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Excel</button>
            <button class="btn-label" onclick="printLabels()">🏷️ In Nhãn</button>
            <button class="btn-print" onclick="printReport()">📄 Báo cáo SOP</button>
            <button class="btn-repair" onclick="printRepair()">🛠️ Phiếu Báo SD</button>
            <button class="btn-logout" onclick="location.reload()">🔒 Đăng xuất</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm..." style="width:100%; padding:14px; border-radius:10px; border:1px solid #cbd5e1; margin-bottom: 15px;">

    <div class="table-container">
        <table>
            <thead>
                <tr><th>STT</th><th>Thiết bị</th><th>Mã CCDC</th><th>Mã Kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th><th>QR</th><th class="admin-only">Xóa</th></tr>
            </thead>
            <tbody id="mainTable"></tbody>
        </table>
    </div>
</div>

<!-- VÙNG IN BÁO CÁO SOP -->
<div id="printArea">
    <div class="sop-header">
        <div>TRUNG TÂM BẢO ĐẢM KỸ THUẬT<br>ĐỘI THÔNG TIN</div>
        <div>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM<br>Độc lập - Tự do - Hạnh phúc</div>
    </div>
    <div class="sop-title"><h1>BẢNG THỐNG KÊ CHI TIẾT THIẾT BỊ</h1><p id="printDate"></p></div>
    <table id="printTable" style="width:100%; border-collapse:collapse;">
        <thead><tr><th>STT</th><th>Tên thiết bị</th><th>Mã CCDC</th><th>Mã kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th></tr></thead>
        <tbody id="printTableBody"></tbody>
    </table>
</div>

<!-- VÙNG IN PHIẾU BÁO SỬ DỤNG (REPAIR) -->
<div id="repairArea"></div>

<!-- VÙNG IN NHÃN -->
<div id="labelArea"></div>

<script>
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbywWF4ZrtOxZJw_dIhixcnkJ-fIR6qvugRbbORvbeTLD73w8EiE4WyAqILrWVI-4z-_/exec";
    const STORAGE_KEY = 'atcc_inventory_sop_final';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentUser = null;

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if (u === 'admin' && p === 'admin') currentUser = 'admin';
        else if (u === 'guest' && p === '123456') currentUser = 'guest';
        else return alert("Sai mật khẩu!");
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        render();
    }

    async function addItem() {
        const name = document.getElementById('inName').value;
        if(!name) return;
        const newItem = {
            name, code: document.getElementById('inCode').value || "-",
            warehouse: document.getElementById('inWarehouse').value || "-",
            pn: document.getElementById('inPN').value || "-",
            sn: document.getElementById('inSN').value || "-",
            loc: document.getElementById('inLoc').value || "-"
        };
        try {
            await fetch(URL_APPS_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newItem) });
            inventory.push(newItem); saveData();
            alert("Đã lưu!");
        } catch (e) { alert("Lỗi!"); }
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        const lArea = document.getElementById('labelArea');
        const rArea = document.getElementById('repairArea');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        tbody.innerHTML = ''; pBody.innerHTML = ''; lArea.innerHTML = ''; rArea.innerHTML = '';
        
        inventory.filter(i => i.name.toLowerCase().includes(search)).forEach((item, idx) => {
            // Web table
            tbody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td><td><div id="qr-${idx}"></div></td><td class="admin-only"><button onclick="deleteItem(${idx})">Xóa</button></td></tr>`;
            
            // SOP table
            pBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;
            
            // Labels
            lArea.innerHTML += `<div class="label-box"><div class="label-text">TB: ${item.name}<br>S/N: ${item.sn}<br>VT: ${item.loc}</div><div id="qrl-${idx}"></div></div>`;
            
            // Phiếu báo SD thiết bị
            rArea.innerHTML += `
                <div class="repair-card">
                    <div class="repair-title">PHIẾU BÁO SỬ DỤNG / SỬA CHỮA THIẾT BỊ</div>
                    <div class="repair-row"><span class="repair-label">Tên thiết bị:</span> <span>${item.name}</span></div>
                    <div class="repair-row"><span class="repair-label">Mã CCDC:</span> <span>${item.code}</span></div>
                    <div class="repair-row"><span class="repair-label">Số Serial (S/N):</span> <span>${item.sn}</span></div>
                    <div class="repair-row"><span class="repair-label">Vị trí lắp đặt:</span> <span>${item.loc}</span></div>
                    <div class="repair-row"><span class="repair-label">Tình trạng báo cáo:</span> <span>..................................................................</span></div>
                    <div style="display:flex; justify-content: space-between; margin-top:30px; text-align:center;">
                        <div>Người báo cáo<br><br><br>..........................</div>
                        <div>Xác nhận đơn vị<br><br><br>..........................</div>
                    </div>
                </div>`;

            setTimeout(() => {
                const txt = `${item.name}|${item.sn}`;
                new QRCode(document.getElementById(`qr-${idx}`), { text: txt, width: 40, height: 40 });
                new QRCode(document.getElementById(`qrl-${idx}`), { text: txt, width: 70, height: 70 });
            }, 50);
        });
        if (currentUser === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'table-cell');
    }

    function deleteItem(idx) { inventory.splice(idx,1); saveData(); }
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); render(); }
    function printReport() { document.body.className = "printing-report"; window.print(); }
    function printLabels() { document.body.className = "printing-labels"; window.print(); }
    function printRepair() { document.body.className = "printing-repair"; window.print(); }
    async function syncFromCloud() {
        const res = await fetch(URL_APPS_SCRIPT);
        const data = await res.json();
        inventory = data; saveData();
    }
    function exportCSV() { /* Code xuất excel như cũ */ }
</script>
</body>
</html>
