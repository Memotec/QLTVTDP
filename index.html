<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUẢN LÝ THIẾT BỊ CNS/ATM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #4338ca; --bg: #f1f5f9; --txt: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 15px; }
        .no-print { max-width: 1250px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; margin-top: 4px; outline: none; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; }
        .btn-add { background: var(--p); }
        .btn-sync { background: #6366f1; }
        .btn-excel { background: #10b981; }
        .btn-label { background: #f59e0b; } 
        .btn-print { background: #0f172a; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        thead { display: none; }
        tbody tr { display: block; background: white; border-radius: 10px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        tbody td { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(6, 1fr); }
            thead { display: table-header-group; text-align: center; }
            tbody tr { display: table-row; }
            tbody td { display: table-cell; padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: center; }
            .actions { grid-template-columns: repeat(5, 1fr); }
        }

        #printArea, #labelArea { display: none; }

        @media print {
            @page { margin: 0; }
            .no-print { display: none !important; }
            
            /* In Báo Cáo */
            body.printing-report #printArea { display: block !important; padding: 20px; }
            #printTable { width: 100%; border-collapse: collapse; }
            #printTable th, #printTable td { border: 1px solid #000; padding: 6px; font-size: 11px; }
            
            /* IN NHÃN DÁN - KÍCH THƯỚC 55mm x 30mm */
            body.printing-labels #labelArea { 
                display: block !important; 
            }
            .label-box { 
                width: 55mm; 
                height: 30mm; 
                border: 0.5pt solid #000; 
                padding: 1.5mm; 
                display: flex; 
                justify-content: space-between;
                align-items: center;
                overflow: hidden;
                page-break-after: always;
                background: #fff;
                margin: 0;
            }
            .label-text { 
                font-size: 6.5pt; 
                line-height: 1.1; 
                font-weight: bold; 
                flex: 1; 
                text-transform: uppercase;
                overflow: hidden;
            }
            .label-qr-wrap { 
                width: 22mm; 
                height: 22mm; 
                margin-left: 1mm; 
            }
            .label-qr-wrap img { width: 100%; height: 100%; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: var(--p);">HỆ THỐNG QUẢN LÝ CNS/ATM</h2>
        <div style="font-size: 12px; background: #fff; padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd;">
            KTV: <b>Trần Văn Trường</b>
        </div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="full"><label>Tên thiết bị</label><input type="text" id="inName"></div>
            <div><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div><label>Mã Kho</label><input type="text" id="inWarehouse"></div>
            <div><label>P/N</label><input type="text" id="inPN"></div>
            <div><label>S/N</label><input type="text" id="inSN"></div>
            <div class="full"><label>Vị trí</label><input type="text" id="inLoc"></div>
        </div>
        <div class="actions">
            <button class="btn-add" onclick="addItem()">➕ Thêm</button>
            <button class="btn-sync" onclick="syncFromCloud()">🔄 Đồng bộ</button>
            <button class="btn-excel" onclick="exportCSV()">📁 Excel</button>
            <button class="btn-label" onclick="printLabels()">🏷️ In Nhãn (55x30)</button>
            <button class="btn-print" onclick="printReport()">📄 Báo cáo</button>
        </div>
    </div>

    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Tìm kiếm nhanh..." style="width:100%; padding:14px; border-radius:8px; border:1px solid #cbd5e1; margin-bottom: 15px;">

    <table>
        <thead>
            <tr>
                <th>STT</th><th>Thiết bị</th><th>Mã CCDC</th><th>Mã Kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th><th>QR</th><th>Xóa</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<div id="printArea">
    <h3 style="text-align: center;">DANH MỤC THIẾT BỊ CNS/ATM</h3>
    <table id="printTable">
        <thead>
            <tr><th>STT</th><th>Thiết bị</th><th>Mã CCDC</th><th>Mã Kho</th><th>P/N</th><th>S/N</th><th>Vị trí</th></tr>
        </thead>
        <tbody id="printTableBody"></tbody>
    </table>
</div>

<div id="labelArea"></div>

<script>
    const STORAGE_KEY = 'atcc_inventory_v5';
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbz3g8qLp38h2DYVp6Y5FCsur1h-TsEwJ5Y6_D3oVtTu8M_rpZD1tviNG3tcu3ex-LLu/exec"; 
    const PASS_KEY = "123456";

    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    function addItem() {
        const name = document.getElementById('inName').value;
        const code = document.getElementById('inCode').value;
        const warehouse = document.getElementById('inWarehouse').value;
        const pn = document.getElementById('inPN').value;
        const sn = document.getElementById('inSN').value;
        const loc = document.getElementById('inLoc').value;
        if(!code || !name) return alert("Nhập Tên và Mã CCDC!");
        inventory.push({ id: Date.now(), name, code, warehouse, pn, sn, loc });
        saveLocal();
        ['inName','inCode','inWarehouse','inPN','inSN','inLoc'].forEach(id => document.getElementById(id).value = '');
    }

    function saveLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
        if (!URL_APPS_SCRIPT.includes("DÁN_URL")) {
            fetch(URL_APPS_SCRIPT, { method: "POST", mode: "no-cors", body: JSON.stringify(inventory) });
        }
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        const pBody = document.getElementById('printTableBody');
        const lArea = document.getElementById('labelArea');
        const q = document.getElementById('searchInput').value.toLowerCase();
        
        tbody.innerHTML = ''; pBody.innerHTML = ''; lArea.innerHTML = '';
        const filtered = inventory.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(q)));

        filtered.forEach((item, idx) => {
            const qrId = `qr-${item.id}`;
            const qrIdL = `qr-l-${item.id}`;

            tbody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td><td><div id="${qrId}"></div></td><td><span onclick="deleteItem(${item.id})" style="cursor:pointer;color:red">🗑️</span></td></tr>`;
            pBody.innerHTML += `<tr><td>${idx+1}</td><td>${item.name}</td><td>${item.code}</td><td>${item.warehouse}</td><td>${item.pn}</td><td>${item.sn}</td><td>${item.loc}</td></tr>`;

            // NHÃN DÁN 55x30mm
            lArea.innerHTML += `
                <div class="label-box">
                    <div class="label-text">
                        CNS/ATM ASSET<br>
                        TB: ${item.name.substring(0,25)}<br>
                        CCDC: ${item.code}<br>
                        KHO: ${item.warehouse || '-'}<br>
                        P/N: ${item.pn || '-'}<br>
                        S/N: ${item.sn || '-'}<br>
                        VT: ${item.loc || '-'}
                    </div>
                    <div id="${qrIdL}" class="label-qr-wrap"></div>
                </div>`;

            setTimeout(() => {
                const txt = `TB: ${item.name}\nCCDC: ${item.code}\nKHO: ${item.warehouse}\nPN: ${item.pn}\nSN: ${item.sn}\nVT: ${item.loc}`;
                if(document.getElementById(qrId)) new QRCode(document.getElementById(qrId), { text: txt, width: 60, height: 60 });
                if(document.getElementById(qrIdL)) new QRCode(document.getElementById(qrIdL), { text: txt, width: 85, height: 85 });
            }, 300);
        });
    }

    function printReport() { document.body.className = "printing-report"; window.print(); }
    function printLabels() { document.body.className = "printing-labels"; window.print(); }

    function deleteItem(id) {
        if(!confirm(`Xóa?`)) return;
        if(prompt("Mật mã:") !== PASS_KEY) return;
        inventory = inventory.filter(i => i.id !== id);
        saveLocal();
    }

    async function syncFromCloud() {
        if (URL_APPS_SCRIPT.includes("DÁN_URL")) return alert("Cần URL!");
        const res = await fetch(URL_APPS_SCRIPT);
        const data = await res.json();
        if (data) { inventory = data; render(); }
    }

    function exportCSV() {
        let csv = "\ufeffSTT,Thiết bị,Mã CCDC,Kho,P/N,S/N,Vị trí\n";
        inventory.forEach((i, idx) => csv += `${idx+1},${i.name},${i.code},${i.warehouse},${i.pn},${i.sn},${i.loc}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `VatTu_CNS.csv`; link.click();
    }
    render();
</script>
</body>
</html>
