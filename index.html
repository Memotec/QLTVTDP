<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THỐNG KÊ ĐIỆN THOẠI ATCCHCM</title>
    <style>
        :root {
            --primary: #4338ca;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --danger: #ef4444;
            --success: #10b981;
            --edit: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 1150px; margin: 0 auto; }

        /* Header & Cards */
        .header-top { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .header-top h2 { font-size: 1.1rem; color: #1e1b4b; text-transform: uppercase; text-align: center; }
        .contact-box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 14px; text-align: center; }

        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group:nth-child(1), .form-group:nth-child(2) { grid-column: span 2; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none; }

        .toolbar { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        button { padding: 12px 10px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; color: white; font-size: 13px; }
        .btn-add { grid-column: span 2; background: var(--primary); }
        .btn-excel { background: var(--success); }
        .btn-report { background: #6366f1; }
        .btn-print { background: #0f172a; }

        /* Table & Responsive */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        thead { display: none; }
        tbody tr { display: block; background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        tbody td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tbody td::before { content: attr(data-label); font-weight: 700; color: #64748b; font-size: 11px; text-transform: uppercase; }
        
        .btn-group-row { display: flex; gap: 10px; }
        .btn-edit-small { background: var(--edit); padding: 5px 12px; }
        .btn-delete-small { background: var(--danger); padding: 5px 12px; }

        /* MODAL CHỈNH SỬA */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-header { font-weight: bold; font-size: 18px; margin-bottom: 15px; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .modal-footer button { flex: 1; }

        @media (min-width: 768px) {
            .header-top { flex-direction: row; justify-content: space-between; }
            .form-grid { grid-template-columns: repeat(4, 1fr); }
            .form-group:nth-child(1), .form-group:nth-child(2) { grid-column: auto; }
            .toolbar { flex-direction: row; }
            .actions { display: flex; width: auto; }
            thead { display: table-header-group; }
            thead th { padding: 12px; font-size: 11px; color: #64748b; text-align: left; background: #f8fafc; }
            tbody tr { display: table-row; background: white; }
            tbody td { display: table-cell; padding: 12px; border-bottom: 1px solid #e2e8f0; }
            tbody td::before { display: none; }
        }

        #printLabelsArea, #printReportArea { display: none; }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header-top">
        <h2>Thống kê sử dụng điện thoại ATCCHCM</h2>
        <div class="contact-box">Phụ trách: <b>Trần Văn Trường</b></div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="form-group"><label>Thiết bị</label><input type="text" id="inName" value="PANASONIC KX-TS500"></div>
            <div class="form-group"><label>Mã CCDC</label><input type="text" id="inCode"></div>
            <div class="form-group"><label>Số S/N</label><input type="text" id="inSN"></div>
            <div class="form-group"><label>Vị trí</label><input type="text" id="inLoc"></div>
        </div>
        <div class="toolbar">
            <input type="text" id="searchInput" onkeyup="render()" placeholder="Tìm kiếm nhanh...">
            <div class="actions">
                <button class="btn-add" onclick="addItem()">+ Thêm Mới</button>
                <button class="btn-excel" onclick="exportCSV()">📁 Excel</button>
                <button class="btn-report" onclick="printReport()">📄 Bảng Biểu</button>
                <button class="btn-print" onclick="printLabels()">🏷️ Tem</button>
            </div>
        </div>
    </div>

    <div id="tableBodyContainer">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Thiết Bị</th>
                    <th>Mã CCDC</th>
                    <th>Số S/N</th>
                    <th>Vị Trí</th>
                    <th>Thao Tác</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- MODAL CHỈNH SỬA -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Chỉnh sửa thông tin</div>
        <input type="hidden" id="editIndex">
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div class="form-group"><label>Tên Thiết Bị</label><input type="text" id="editName"></div>
            <div class="form-group"><label>Mã CCDC</label><input type="text" id="editCode"></div>
            <div class="form-group"><label>Số S/N</label><input type="text" id="editSN"></div>
            <div class="form-group"><label>Vị Trí</label><input type="text" id="editLoc"></div>
        </div>
        <div class="modal-footer">
            <button onclick="closeModal()" style="background: #94a3b8;">Hủy</button>
            <button onclick="saveEdit()" style="background: var(--primary);">Lưu thay đổi</button>
        </div>
    </div>
</div>

<div id="printLabelsArea"></div>
<div id="printReportArea">
    <table border="1" style="width:100%; border-collapse: collapse;">
        <thead><tr><th>STT</th><th>Thiết Bị</th><th>Mã CCDC</th><th>S/N</th><th>Vị Trí</th></tr></thead>
        <tbody id="reportTableBody"></tbody>
    </table>
</div>

<script>
    const PASS_KEY = "123456";
    let inventory = JSON.parse(localStorage.getItem('atcc_v10_db')) || [];

    function save() {
        localStorage.setItem('atcc_v10_db', JSON.stringify(inventory));
        render();
    }

    function addItem() {
        const name = document.getElementById('inName').value;
        const code = document.getElementById('inCode').value;
        const sn = document.getElementById('inSN').value;
        const loc = document.getElementById('inLoc').value;
        if(!name || !code) return alert("Vui lòng nhập Tên và Mã!");
        inventory.push({ id: Date.now(), name, code, sn, loc });
        save();
        document.getElementById('inCode').value = '';
    }

    // --- TÍNH NĂNG CHỈNH SỬA MỚI ---
    function openEdit(id) {
        const item = inventory.find(i => i.id === id);
        const idx = inventory.findIndex(i => i.id === id);
        document.getElementById('editIndex').value = idx;
        document.getElementById('editName').value = item.name;
        document.getElementById('editCode').value = item.code;
        document.getElementById('editSN').value = item.sn;
        document.getElementById('editLoc').value = item.loc;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    function saveEdit() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx].name = document.getElementById('editName').value;
        inventory[idx].code = document.getElementById('editCode').value;
        inventory[idx].sn = document.getElementById('editSN').value;
        inventory[idx].loc = document.getElementById('editLoc').value;
        save();
        closeModal();
    }

    function deleteItem(id) {
        if (confirm("Xác nhận xóa?")) {
            const pw = prompt("Nhập mật khẩu xóa:");
            if (pw === PASS_KEY) {
                inventory = inventory.filter(i => i.id !== id);
                save();
            } else if (pw !== null) alert("Sai mật khẩu!");
        }
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        const query = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';

        const filtered = inventory.filter(item => 
            Object.values(item).some(val => String(val).toLowerCase().includes(query))
        );

        filtered.forEach((item, idx) => {
            tbody.innerHTML += `<tr>
                <td data-label="STT">${idx+1}</td>
                <td data-label="Thiết bị"><b>${item.name}</b></td>
                <td data-label="Mã CCDC">${item.code}</td>
                <td data-label="S/N">${item.sn || '-'}</td>
                <td data-label="Vị trí">${item.loc || '-'}</td>
                <td data-label="Thao tác">
                    <div class="btn-group-row">
                        <button class="btn-edit-small" onclick="openEdit(${item.id})">✏️ Sửa</button>
                        <button class="btn-delete-small" onclick="deleteItem(${item.id})">🗑️ Xóa</button>
                    </div>
                </td>
            </tr>`;
        });
    }

    // Các hàm phụ trợ (Excel/Print) giữ nguyên logic từ phiên bản trước
    function printReport() { /* ...logic cũ... */ window.print(); }
    function printLabels() { /* ...logic cũ... */ window.print(); }
    function exportCSV() {
        let csv = "\ufeffSTT,Thiet Bi,Ma CCDC,S/N,Vi Tri\n";
        inventory.forEach((i, idx) => csv += `${idx+1},${i.name},${i.code},${i.sn},${i.loc}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ThongKe_DienThoai.csv";
        link.click();
    }

    render();
</script>
</body>
</html>
